        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Noto Sans Ethiopic', system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #f9a826 0%, #fdd97a 50%, #ffefb5 100%);
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        .sun {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #ffdd77, #ffaa33);
            border-radius: 50%;
            box-shadow: 0 0 60px #ffaa44;
            z-index: 0;
            animation: glowPulse 3s infinite alternate;
            pointer-events: none;
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 20px #ffaa44; transform: translateX(-50%) scale(1);}
            100% { box-shadow: 0 0 80px #ffcc66; transform: translateX(-50%) scale(1.02);}
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 850px;
            margin: 0 auto;
            background: rgba(255, 248, 225, 0.96);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        h1 { text-align: center; font-size: 1.8rem; color: #b45f06; }
        .tsehay-logo { text-align: center; font-size: 40px; margin: 8px 0; }
        
        .input-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #7a4b03; }
        input { width: 100%; padding: 14px; border-radius: 60px; border: 2px solid #ffc857; font-size: 16px; background: white; }
        button { background: #f39c12; color: white; border: none; padding: 14px 20px; border-radius: 60px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }
        
        .mode-buttons { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
        .mode-btn { flex: 1; background: #ffd966; color: #5a3a01; font-size: 14px; padding: 12px; text-align: center; cursor: pointer; border-radius: 40px; transition: all 0.2s; }
        .mode-btn.active { background: #e67e22; color: white; transform: scale(1.02); }
        
        .stage-info {
            background: #ffefcf;
            border-radius: 40px;
            padding: 15px;
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .stage-badge {
            background: #e67e22;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
        }
        .progress-bar {
            flex: 1;
            height: 20px;
            background: #ffd966;
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #2e7d32;
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 20px;
        }
        
        .game-area {
            background: #fff6e5;
            border-radius: 48px;
            padding: 25px;
            text-align: center;
            border: 3px solid #ffcc77;
            position: relative;
            overflow: hidden;
        }
        
        /* Timer Styles */
        .timer-container {
            background: #ffefcf;
            border-radius: 60px;
            padding: 10px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            flex-wrap: wrap;
        }
        .timer-ring {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: conic-gradient(#2e7d32 0deg, #ffd966 0deg);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .timer-number {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: #e67e22;
        }
        .timer-label {
            font-weight: bold;
            color: #7a4b03;
            font-size: 14px;
        }
        .bonus-display {
            background: #ffd966;
            padding: 5px 15px;
            border-radius: 40px;
            font-weight: bold;
            color: #5a3a01;
        }
        
        .sequence-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .letter-card {
            background: #ffefcf;
            padding: 20px 25px;
            border-radius: 60px;
            font-size: 55px;
            font-weight: bold;
            box-shadow: inset 0 -2px 0 #ddb56b, 0 5px 15px rgba(0,0,0,0.1);
            min-width: 85px;
            text-align: center;
        }
        
        .missing-slot {
            background: #ffe0a3;
            border: 3px dashed #e67e22;
            padding: 20px 25px;
            border-radius: 60px;
            font-size: 55px;
            font-weight: bold;
            min-width: 85px;
            text-align: center;
            position: relative;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .missing-slot.filled {
            background: #ccffcc;
            border: 3px solid #2e7d32;
            animation: celebrate 0.5s ease;
        }
        
        @keyframes celebrate {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); background: #aaffaa; }
            100% { transform: scale(1); }
        }
        
        .options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
            min-height: 120px;
        }
        
        .option {
            background: #fffaec;
            padding: 15px 25px;
            border-radius: 60px;
            font-size: 40px;
            cursor: pointer;
            min-width: 90px;
            text-align: center;
            font-weight: bold;
            border: 3px solid #ffbb55;
            transition: all 0.2s;
        }
        
        .option:hover { transform: scale(1.05); background: #ffe0a3; }
        .option:active { transform: scale(0.95); }
        .option.disabled { opacity: 0.5; pointer-events: none; }
        
        .flying {
            position: fixed;
            z-index: 1000;
            animation: flyToTarget 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            pointer-events: none;
            font-size: 50px;
            font-weight: bold;
            background: #fffaec;
            padding: 10px 20px;
            border-radius: 60px;
            border: 3px solid #2e7d32;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        
        @keyframes flyToTarget {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            50% { transform: translate(calc(var(--target-x) * 0.5), calc(var(--target-y) * 0.5 - 50px)) scale(1.2); opacity: 1; }
            100% { transform: translate(var(--target-x), var(--target-y)) scale(0.8); opacity: 0; }
        }
        
        .dropping {
            position: fixed;
            z-index: 1000;
            animation: dropDown 0.5s ease-in forwards;
            pointer-events: none;
            font-size: 50px;
            font-weight: bold;
            background: #ffcccc;
            padding: 10px 20px;
            border-radius: 60px;
            border: 3px solid #c0392b;
        }
        
        @keyframes dropDown {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            100% { transform: translate(0, 200px) rotate(20deg); opacity: 0; }
        }
        
        .feedback { margin: 15px 0; font-size: 22px; font-weight: bold; min-height: 70px; }
        .correct { color: #2b7a2b; }
        .wrong { color: #c0392b; }
        
        .next-btn { background: #2e7d32; margin-top: 10px; }
        .logout { background: #c0392b; width: auto; padding: 8px 16px; margin-top: 0; }
        .auth-toggle { text-align: center; margin-top: 15px; color: #7a4b03; cursor: pointer; }
        .auth-toggle span { text-decoration: underline; font-weight: bold; }
        
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #ffdd77;
            position: absolute;
            animation: confettiFall 1s ease-out forwards;
            pointer-events: none;
            z-index: 1000;
        }
        
        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(300px) rotate(360deg); opacity: 0; }
        }
        
        .hide { display: none; }
        
        @media (max-width: 600px) {
            .letter-card, .missing-slot { font-size: 35px; padding: 12px 15px; min-width: 65px; }
            .option { font-size: 30px; padding: 10px 18px; min-width: 70px; }
            .sequence-container { gap: 8px; }
            .timer-ring { width: 55px; height: 55px; }
            .timer-number { width: 45px; height: 45px; font-size: 22px; }
        }
    </style>
</head>

        { name: "ወ ቤተሰብ", letters: ["ወ","ዉ","ዊ","ዋ","ዌ","ው","ዎ"] },
        { name: "ዐ ቤተሰብ", letters: ["ዐ","ዑ","ዒ","ዓ","ዔ","ዕ","ዖ"] },
        { name: "ዘ ቤተሰብ", letters: ["ዘ","ዙ","ዚ","ዛ","ዜ","ዝ","ዞ"] },

    ];
    
    const ENGLISH_STAGES = [
        { name: "A B C D E F G", letters: ["A","B","C","D","E","F","G"] },
        { name: "H I J K L M N", letters: ["H","I","J","K","L","M","N"] },
        { name: "O P Q R S T U", letters: ["O","P","Q","R","S","T","U"] },
        { name: "V W X Y Z", letters: ["V","W","X","Y","Z"] }
    ];
    
    const NUMBERS_STAGES = [];
    for (let i = 1; i <= 1000; i += 10) {
        let end = Math.min(i + 9, 1000);
        let letters = [];
        for (let j = i; j <= end; j++) letters.push(j.toString());
        NUMBERS_STAGES.push({ name: `${i} - ${end}`, letters: letters });
    }
    
    // Game State
    let currentUser = null;
    let currentMode = "amharic";
    let currentStages = AMHARIC_STAGES;
    let currentStageIndex = 0;
    let stageMastery = {};
    let currentMissingSlots = []; // Array of {position, correct}
    let currentOptions = [];
    let waitingForNext = false;
    let timerInterval = null;
    let timeLeft = 10;
    let currentBonus = 0;
    
    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }
    
    function startTimer() {
        stopTimer();
        timeLeft = 10;
        updateTimerDisplay();
        
        timerInterval = setInterval(() => {
            if (!waitingForNext) {
                timeLeft--;
                updateTimerDisplay();
                
                if (timeLeft <= 0) {
                    stopTimer();
                    if (!waitingForNext) {
                        autoTimeout();
                    }
                }
            }
        }, 1000);
    }
    
    function updateTimerDisplay() {
        const timerDiv = document.getElementById("timerDisplay");
        if (timerDiv) {
            timerDiv.innerText = timeLeft;
            // Change color based on time
            if (timeLeft <= 3) {
                timerDiv.style.color = "#c0392b";
                timerDiv.style.animation = "pulse 0.5s infinite";
            } else {
                timerDiv.style.color = "#e67e22";
                timerDiv.style.animation = "none";
            }
            
            // Update ring
            const ring = document.querySelector(".timer-ring");
            if (ring) {
                let degrees = (timeLeft / 10) * 360;
                ring.style.background = `conic-gradient(#2e7d32 ${degrees}deg, #ffd966 ${degrees}deg)`;
            }
        }
    }
    
    function autoTimeout() {
        const feedbackDiv = document.getElementById("feedbackMsg");
        feedbackDiv.innerHTML = "<span class='wrong'>⏰ Time's up! The correct answer is shown below.</span>";
        waitingForNext = true;
        
        // Show correct answers in missing slots
        const slots = document.querySelectorAll(".missing-slot");
        slots.forEach((slot, idx) => {
            if (idx < currentMissingSlots.length) {
                slot.innerHTML = currentMissingSlots[idx].correct;
                slot.classList.add("filled");
            }
        });
        
        document.querySelectorAll(".option").forEach(opt => {
            opt.classList.add("disabled");
        });
        
        stopTimer();
    }
    
    function createConfetti() {
        for (let i = 0; i < 40; i++) {
            let confetti = document.createElement("div");
            confetti.className = "confetti";
            confetti.style.left = Math.random() * 100 + "%";
            confetti.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
            confetti.style.width = Math.random() * 10 + 5 + "px";
            confetti.style.height = Math.random() * 10 + 5 + "px";
            confetti.style.animationDuration = Math.random() * 1 + 0.5 + "s";
            document.querySelector(".game-area").appendChild(confetti);
            setTimeout(() => confetti.remove(), 1000);
        }
    }
    
    function generateQuestion() {
        const stage = currentStages[currentStageIndex];
        const letters = stage.letters;
        
        if (letters.length < 3) return null;
        
        // Determine how many missing slots (2-3 for more challenge)
        let missingCount = Math.min(2 + Math.floor(Math.random() * 2), letters.length - 2);
        let startPos = Math.floor(Math.random() * (letters.length - missingCount - 1));
        
        currentMissingSlots = [];
        for (let i = 0; i < missingCount; i++) {
            currentMissingSlots.push({
                position: startPos + i + 1,
                correct: letters[startPos + i + 1]
            });
        }
        
        // Build the sequence with missing slots
        let sequence = [];
        let correctAnswers = [];
        
        for (let i = 0; i < letters.length && i < startPos + missingCount + 2; i++) {
            let isMissing = false;
            for (let m of currentMissingSlots) {
                if (m.position === i) {
                    sequence.push({ type: "missing", id: `missing_${i}` });
                    correctAnswers.push(m.correct);
                    isMissing = true;
                    break;
                }
            }
            if (!isMissing && i < letters.length) {
                sequence.push({ type: "letter", value: letters[i] });
            }
        }
        
        // Generate wrong options (pool from all letters except correct ones)
        let wrongPool = [];
        for (let l of letters) {
            if (!correctAnswers.includes(l) && !sequence.some(s => s.type === "letter" && s.value === l)) {
                wrongPool.push(l);
            }
        }
        
        // Add from previous stage
        if (currentStageIndex > 0) {
            currentStages[currentStageIndex - 1].letters.forEach(l => {
                if (!wrongPool.includes(l) && !correctAnswers.includes(l)) wrongPool.push(l);
            });
        }
        
        let shuffledWrong = [...wrongPool].sort(() => Math.random() - 0.5);
        let wrongs = shuffledWrong.slice(0, 6);
        
        // Options: all correct answers combined into options (one option per correct answer)
        // But for kids, we'll give multiple options to choose from for each missing slot
        // Actually simpler: each missing slot has its own set of options
        // But for UX, we'll create a combined approach
        
        let allOptions = [...correctAnswers];
        for (let w of wrongs) {
            if (!allOptions.includes(w)) allOptions.push(w);
        }
        for (let i = allOptions.length - 1; i > 0; i--) {
            let j = Math.floor(Math.random() * (i + 1));
            [allOptions[i], allOptions[j]] = [allOptions[j], allOptions[i]];
        }
        
        return { sequence, correctAnswers, allOptions };
    }
    
    let currentSequence = [];
    let currentCorrectAnswers = [];
    
    function renderGame() {
        const q = generateQuestion();
        if (!q) return;
        
        currentSequence = q.sequence;
        currentCorrectAnswers = q.correctAnswers;
        currentOptions = q.allOptions;
        
        const container = document.getElementById("sequenceContainer");
        container.innerHTML = "";
        
        currentSequence.forEach((item, idx) => {
            if (item.type === "letter") {
                const div = document.createElement("div");
                div.className = "letter-card";
                div.innerText = item.value;
                container.appendChild(div);
            } else {
                const div = document.createElement("div");
                div.className = "missing-slot";
                div.setAttribute("data-slot-idx", idx);
                div.innerText = "___";
                div.onclick = () => showOptionsForSlot(idx);
                container.appendChild(div);
            }
        });
        
        const optionsDiv = document.getElementById("optionsContainer");
        optionsDiv.innerHTML = "";
        
        currentOptions.forEach(opt => {
            const btn = document.createElement("div");
            btn.className = "option";
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(btn, opt);
            optionsDiv.appendChild(btn);
        });
        
        document.getElementById("feedbackMsg").innerHTML = "";
        waitingForNext = false;
        currentBonus = 0;
        document.getElementById("bonusDisplay").innerHTML = "⭐ Bonus: 0";
        
        startTimer();
        
        const stage = currentStages[currentStageIndex];
        const masteredCount = stageMastery[`${currentMode}_stage_${currentStageIndex}`] || 0;
        const totalInStage = stage.letters.length;
        const stageProgress = Math.floor((masteredCount / totalInStage) * 100);
        
        document.getElementById("stageDisplay").innerHTML = `Derja ${currentStageIndex + 1}: ${stage.name}`;
        document.getElementById("stageProgress").style.width = `${stageProgress}%`;
        document.getElementById("masteryDisplay").innerHTML = `⭐ ${stageProgress}% Mastered`;
    }
    
    let currentTargetSlot = null;
    
    function showOptionsForSlot(slotIdx) {
        // Highlight which slot we're answering
        document.querySelectorAll(".missing-slot").forEach(slot => {
            slot.style.background = "#ffe0a3";
        });
        const slot = document.querySelector(`.missing-slot[data-slot-idx="${slotIdx}"]`);
        if (slot) {
            slot.style.background = "#ffcc88";
            currentTargetSlot = slotIdx;
        }
    }
    
    async function handleAnswer(element, selected) {
        if (waitingForNext) return;
        
        // Find which missing slot this answer belongs to
        let matchedIndex = -1;
        for (let i = 0; i < currentCorrectAnswers.length; i++) {
            if (selected === currentCorrectAnswers[i]) {
                matchedIndex = i;
                break;
            }
        }
        
        if (matchedIndex === -1) {
            // Wrong answer
            await flyToTarget(element, null, false);
            document.getElementById("feedbackMsg").innerHTML = `<span class='wrong'>❌ ተሳስተሃል! ${selected} ትክክል አይደለም ❌</span>`;
            return;
        }
        
        // Correct answer - find the corresponding missing slot
        const slots = document.querySelectorAll(".missing-slot");
        if (matchedIndex < slots.length) {
            const targetSlot = slots[matchedIndex];
            await flyToTarget(element, targetSlot, true);
            
            targetSlot.innerHTML = selected;
            targetSlot.classList.add("filled");
            targetSlot.style.background = "#ccffcc";
            targetSlot.onclick = null;
            
            // Calculate bonus based on time left
            let bonusPoints = timeLeft;
            currentBonus += bonusPoints;
            document.getElementById("bonusDisplay").innerHTML = `⭐ Bonus: ${currentBonus}`;
            
            document.getElementById("feedbackMsg").innerHTML = `<span class='correct'>✅ ትክክል! +${bonusPoints} bonus! 🎉</span>`;
            createConfetti();
            
            // Check if all missing slots are filled
            let allFilled = true;
            slots.forEach(slot => {
                if (slot.innerHTML === "___") allFilled = false;
            });
            
            if (allFilled) {
                // Stage mastery update
                const stageKey = `${currentMode}_stage_${currentStageIndex}`;
                if (!stageMastery[stageKey]) stageMastery[stageKey] = 0;
                
                const stage = currentStages[currentStageIndex];
                const totalLetters = stage.letters.length;
                const currentMastered = stageMastery[stageKey];
                
                if (currentMastered < totalLetters) {
                    stageMastery[stageKey] = Math.min(currentMastered + 1, totalLetters);
                }
                
                if (stageMastery[stageKey] >= totalLetters) {
                    if (currentStageIndex + 1 < currentStages.length) {
                        document.getElementById("feedbackMsg").innerHTML += `<br><span class='correct'>🎉 Derja ${currentStageIndex + 1} ጨረስክ! ወደ ቀጣይ ደረጃ! 🎉</span>`;
                        currentStageIndex++;
                        const newStageKey = `${currentMode}_stage_${currentStageIndex}`;
                        if (!stageMastery[newStageKey]) stageMastery[newStageKey] = 0;
                    } else {
                        document.getElementById("feedbackMsg").innerHTML += `<br><span class='correct'>🏆 ኮንግራትዩሌሽን! ሁሉንም ጨረስክ! 🏆</span>`;
                    }
                }
                
                if (currentUser) {
                    try {
                        db.collection("users").doc(currentUser.uid).set({
                            [`progress.${currentMode}.stage`]: currentStageIndex,
                            [`progress.${currentMode}.mastery`]: stageMastery,
                            lastActive: new Date().toISOString()
                        }, { merge: true });
                    } catch(e) {}
                }
                
                waitingForNext = true;
                document.querySelectorAll(".option").forEach(opt => {
                    opt.classList.add("disabled");
                });
                stopTimer();
            }
        }
    }
    
    async function flyToTarget(element, targetElement, isCorrect) {
        if (!targetElement && !isCorrect) {
            // Wrong answer - just drop
            const rect = element.getBoundingClientRect();
            const dropping = document.createElement("div");
            dropping.className = "dropping";
            dropping.innerText = element.innerText;
            dropping.style.left = rect.left + "px";
            dropping.style.top = rect.top + "px";
            dropping.style.position = "fixed";
            document.body.appendChild(dropping);
            setTimeout(() => dropping.remove(), 500);
            return;
        }
        
        if (targetElement && isCorrect) {
            const rect = element.getBoundingClientRect();
            const targetRect = targetElement.getBoundingClientRect();
            
            const deltaX = targetRect.left + targetRect.width/2 - (rect.left + rect.width/2);
            const deltaY = targetRect.top + targetRect.height/2 - (rect.top + rect.height/2);
            
            const flying = document.createElement("div");
            flying.className = "flying";
            flying.innerText = element.innerText;
            flying.style.left = rect.left + "px";
            flying.style.top = rect.top + "px";
            flying.style.position = "fixed";
            flying.style.setProperty("--target-x", deltaX + "px");
            flying.style.setProperty("--target-y", deltaY + "px");
            document.body.appendChild(flying);
            
            // Remove the clicked option
            element.style.opacity = "0";
            element.style.pointerEvents = "none";
            
            setTimeout(() => {
                flying.remove();
            }, 600);
        }
    }
    
    function nextQuestion() {
        stopTimer();
        generateQuestion();
        renderGame();
    }
    
    function switchMode(mode) {
        currentMode = mode;
        if (mode === "amharic") currentStages = AMHARIC_STAGES;
        else if (mode === "english") currentStages = ENGLISH_STAGES;
        else currentStages = NUMBERS_STAGES;
        
        currentStageIndex = 0;
        if (currentUser && window.userProgress && window.userProgress[mode]) {
            currentStageIndex = window.userProgress[mode].stage || 0;
            stageMastery = window.userProgress[mode].mastery || {};
        } else {
            stageMastery = {};
        }
        
        renderGame();
    }
    
    // Auth (same as before)
    document.getElementById("showSignup").onclick = () => {
        document.getElementById("loginForm").classList.add("hide");
        document.getElementById("signupForm").classList.remove("hide");
    };
    document.getElementById("showLogin").onclick = () => {
        document.getElementById("signupForm").classList.add("hide");
        document.getElementById("loginForm").classList.remove("hide");
    };
    
    document.getElementById("signupBtn").onclick = async () => {
        let name = document.getElementById("signupName").value.trim();
        let email = document.getElementById("signupEmail").value.trim();
        let pass = document.getElementById("signupPassword").value;
        if (!name || !email || !pass) { alert("Fill all fields"); return; }
        if (pass.length < 6) { alert("Password min 6 characters"); return; }
        try {
            let cred = await auth.createUserWithEmailAndPassword(email, pass);
            await db.collection("users").doc(cred.user.uid).set({
                name: name, email: email, createdAt: new Date().toISOString(),
                progress: { amharic: { stage: 0, mastery: {} }, english: { stage: 0, mastery: {} }, numbers: { stage: 0, mastery: {} } }
            });
            currentUser = cred.user;
            window.userProgress = { amharic: { stage: 0, mastery: {} }, english: { stage: 0, mastery: {} }, numbers: { stage: 0, mastery: {} } };
            document.getElementById("authSection").classList.add("hide");
            document.getElementById("learningSection").classList.remove("hide");
            document.getElementById("userNameDisplay").innerText = name;
            renderGame();
        } catch(e) { alert("Signup error: " + e.message); }
    };
    
    document.getElementById("loginBtn").onclick = async () => {
        let email = document.getElementById("loginEmail").value.trim();
        let pass = document.getElementById("loginPassword").value;
        if (!email || !pass) { alert("Enter email and password"); return; }
        try {
            let cred = await auth.signInWithEmailAndPassword(email, pass);
            let doc = await db.collection("users").doc(cred.user.uid).get();
            let userData = doc.data();
            let name = userData ? userData.name : email.split('@')[0];
            currentUser = cred.user;
            window.userProgress = userData?.progress || { amharic: { stage: 0, mastery: {} }, english: { stage: 0, mastery: {} }, numbers: { stage: 0, mastery: {} } };
            document.getElementById("authSection").classList.add("hide");
            document.getElementById("learningSection").classList.remove("hide");
            document.getElementById("userNameDisplay").innerText = name;
            renderGame();
        } catch(e) { alert("Login failed: " + e.message); }
    };
    
    document.getElementById("logoutBtn").onclick = async () => {
        await auth.signOut();
        stopTimer();
        currentUser = null;
        document.getElementById("authSection").classList.remove("hide");
        document.getElementById("learningSection").classList.add("hide");
        document.getElementById("loginForm").classList.remove("hide");
        document.getElementById("signupForm").classList.add("hide");
    };
    
    document.querySelectorAll(".mode-btn").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            switchMode(btn.getAttribute("data-mode"));
        };
    });
    
    document.getElementById("nextBtn").onclick = () => nextQuestion();
    
    console.log("✅ Tsehay Academy with MULTIPLE LETTERS & 10s TIMER!");
</script>
