<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ጸሀይ ትምህርት - Tsehay Learning: Drag & Drop Edition</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'Comic Neue', 'Noto Sans Ethiopic', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #f9a826 0%, #fdd97a 50%, #ffefb5 100%);
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        /* 🌞 RISING SUN ANIMATION */
        .sun {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, #ffdd77, #ffaa33);
            border-radius: 50%;
            box-shadow: 0 0 60px #ffaa44;
            z-index: 0;
            animation: glowPulse 3s infinite alternate;
            pointer-events: none;
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 20px #ffaa44; transform: translateX(-50%) scale(1);}
            100% { box-shadow: 0 0 80px #ffcc66; transform: translateX(-50%) scale(1.02);}
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 248, 225, 0.96);
            border-radius: 64px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        h1 { text-align: center; font-size: 2rem; color: #b45f06; margin-bottom: 8px; }
        .tsehay-logo { text-align: center; font-size: 48px; margin: 8px 0; }
        .input-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #7a4b03; }
        input { width: 100%; padding: 14px; border-radius: 60px; border: 2px solid #ffc857; font-size: 16px; background: white; }
        button { background: #f39c12; color: white; border: none; padding: 14px 20px; border-radius: 60px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .mode-buttons { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
        .mode-btn { flex: 1; background: #ffd966; color: #5a3a01; font-size: 14px; padding: 12px; cursor: pointer; }
        .mode-btn.active { background: #e67e22; color: white; }
        .game-area { background: #fff6e5; border-radius: 48px; padding: 20px; text-align: center; border: 3px solid #ffcc77; }
        .question-card { font-size: 100px; background: #ffefcf; display: inline-block; padding: 30px 50px; border-radius: 60px; margin: 10px; font-weight: bold; box-shadow: inset 0 -2px 0 #ddb56b; }
        .options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            min-height: 150px;
        }
        .option {
            background: #fffaec;
            padding: 20px 30px;
            border-radius: 60px;
            font-size: 48px;
            cursor: grab;
            min-width: 100px;
            text-align: center;
            font-weight: bold;
            border: 3px solid #ffbb55;
            transition: all 0.1s ease;
            touch-action: none;
        }
        .option:active { cursor: grabbing; }
        .option.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }
        .option.drag-over {
            border: 3px dashed #e67e22;
            background: #ffe0a3;
            transform: scale(1.05);
        }
        .answer-zone {
            background: #ffefcf;
            border: 3px dashed #ffaa33;
            border-radius: 60px;
            padding: 20px;
            margin: 20px auto;
            max-width: 300px;
            transition: all 0.2s;
        }
        .answer-zone.drag-over {
            background: #ffe0a3;
            border: 3px solid #e67e22;
            transform: scale(1.02);
        }
        .answer-placeholder {
            font-size: 36px;
            color: #999;
            text-align: center;
        }
        .selected-answer {
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            padding: 15px;
        }
        .feedback { margin-top: 20px; font-size: 24px; font-weight: bold; min-height: 70px; }
        .correct { color: #2b7a2b; }
        .wrong { color: #c0392b; }
        .progress { font-size: 18px; background: #ffefcf; border-radius: 40px; padding: 10px; margin-top: 16px; }
        .hide { display: none; }
        .logout { background: #c0392b; width: auto; padding: 8px 16px; margin-top: 0; }
        .auth-toggle { text-align: center; margin-top: 15px; color: #7a4b03; cursor: pointer; }
        .auth-toggle span { text-decoration: underline; font-weight: bold; }
        
        @media (max-width: 600px) {
            .question-card { font-size: 60px; padding: 20px 30px; }
            .option { font-size: 36px; padding: 12px 20px; min-width: 80px; }
            .selected-answer { font-size: 36px; }
        }
        
        .instruction {
            background: #ffe0a3;
            padding: 10px;
            border-radius: 40px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #7a4b03;
        }
    </style>
</head>
<body>
<div class="sun"></div>
<div class="container" id="app">
    <div id="authSection">
        <div class="tsehay-logo">🌞 ጸሀይ 🌞</div>
        <h1>Tsehay Academy</h1>
        <div style="text-align: center; margin-bottom: 20px;">Drag & Drop Learning • Amharic 7 Orders • English • Numbers 1-1000</div>
        
        <div id="loginForm">
            <div class="input-group">
                <label>📧 Email Address</label>
                <input type="email" id="loginEmail" placeholder="student@example.com">
            </div>
            <div class="input-group">
                <label>🔒 Password</label>
                <input type="password" id="loginPassword" placeholder="password (min 6 chars)">
            </div>
            <button id="loginBtn">🔑 Login</button>
            <div class="auth-toggle">New student? <span id="showSignup">Create an account here</span></div>
        </div>
        
        <div id="signupForm" class="hide">
            <div class="input-group">
                <label>👧🧒 Student Name</label>
                <input type="text" id="signupName" placeholder="e.g., Selam, Dawit">
            </div>
            <div class="input-group">
                <label>📧 Email Address</label>
                <input type="email" id="signupEmail" placeholder="student@example.com">
            </div>
            <div class="input-group">
                <label>🔒 Password (minimum 6 characters)</label>
                <input type="password" id="signupPassword" placeholder="password">
            </div>
            <button id="signupBtn">📝 Register & Start</button>
            <div class="auth-toggle">Already have an account? <span id="showLogin">Login here</span></div>
        </div>
    </div>

    <div id="learningSection" class="hide">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <h2>☀️ ጤና ይስጥልኝ, <span id="userNameDisplay"></span>!</h2>
            <button id="logoutBtn" class="logout">🚪 Exit</button>
        </div>
        <div class="mode-buttons">
            <button data-mode="amharic" class="mode-btn active">🇪🇹 አማርኛ (7 ቅደም)</button>
            <button data-mode="english" class="mode-btn">🔤 English ABC</button>
            <button data-mode="numbers" class="mode-btn">🔢 ቁጥር 1-1000</button>
        </div>
        <div class="game-area">
            <div class="instruction">
                ✨ DRAG the correct answer to the yellow box below! ✨
            </div>
            <div class="question-card" id="currentQuestion">?</div>
            
            <div class="answer-zone" id="answerZone">
                <div class="answer-placeholder" id="answerPlaceholder">⬅️ Drag answer here</div>
                <div class="selected-answer hide" id="selectedAnswer"></div>
            </div>
            
            <div class="options" id="optionsContainer"></div>
            <div class="feedback" id="feedbackMsg"></div>
            <div class="progress" id="progressTracker">⭐ Streak: 0 | ✅ Total: 0 ⭐</div>
            <button id="nextBtn" style="background: #2e7d32; margin-top: 16px;">✨ Next Question ✨</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCxZFWBiuWqK73EUMznAlySXrsC1EPb1BE",
        authDomain: "tsehay-academy.firebaseapp.com",
        projectId: "tsehay-academy",
        storageBucket: "tsehay-academy.firebasestorage.app",
        messagingSenderId: "107212025634",
        appId: "1:107212025634:web:fa043393623e152923ff7b"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    // ======================= COMPLETE AMHARIC 7 ORDERS =======================
    const amharicFamilyMap = {
        "ሀ": ["ሀ","ሁ","ሂ","ሃ","ሄ","ህ","ሆ"],
        "ለ": ["ለ","ሉ","ሊ","ላ","ሌ","ል","ሎ"],
        "ሐ": ["ሐ","ሑ","ሒ","ሓ","ሔ","ሕ","ሖ"],
        "መ": ["መ","ሙ","ሚ","ማ","ሜ","ም","ሞ"],
        "ሠ": ["ሠ","ሡ","ሢ","ሣ","ሤ","ሥ","ሦ"],
        "ረ": ["ረ","ሩ","ሪ","ራ","ሬ","ር","ሮ"],
        "ሰ": ["ሰ","ሱ","ሲ","ሳ","ሴ","ስ","ሶ"],
        "ሸ": ["ሸ","ሹ","ሺ","ሻ","ሼ","ሽ","ሾ"],
        "ቀ": ["ቀ","ቁ","ቂ","ቃ","ቄ","ቅ","ቆ"],
        "በ": ["በ","ቡ","ቢ","ባ","ቤ","ብ","ቦ"],
        "ተ": ["ተ","ቱ","ቲ","ታ","ቴ","ት","ቶ"],
        "ቸ": ["ቸ","ቹ","ቺ","ቻ","ቼ","ች","ቾ"],
        "ኀ": ["ኀ","ኁ","ኂ","ኃ","ኄ","ኅ","ኆ"],
        "ነ": ["ነ","ኑ","ኒ","ና","ኔ","ን","ኖ"],
        "ኘ": ["ኘ","ኙ","ኚ","ኛ","ኜ","ኝ","ኞ"],
        "አ": ["አ","ኡ","ኢ","ኣ","ኤ","እ","ኦ"],
        "ከ": ["ከ","ኩ","ኪ","ካ","ኬ","ክ","ኮ"],
        "ኸ": ["ኸ","ኹ","ኺ","ኻ","ኼ","ኽ","ኾ"],
        "ወ": ["ወ","ዉ","ዊ","ዋ","ዌ","ው","ዎ"],
        "ዐ": ["ዐ","ዑ","ዒ","ዓ","ዔ","ዕ","ዖ"],
        "ዘ": ["ዘ","ዙ","ዚ","ዛ","ዜ","ዝ","ዞ"],
        "ዠ": ["ዠ","ዡ","ዢ","ዣ","ዤ","ዥ","ዦ"],
        "የ": ["የ","ዩ","ዪ","ያ","ዬ","ይ","ዮ"],
        "ደ": ["ደ","ዱ","ዲ","ዳ","ዴ","ድ","ዶ"],
        "ጀ": ["ጀ","ጁ","ጂ","ጃ","ጄ","ጅ","ጆ"],
        "ገ": ["ገ","ጉ","ጊ","ጋ","ጌ","ግ","ጎ"],
        "ጠ": ["ጠ","ጡ","ጢ","ጣ","ጤ","ጥ","ጦ"],
        "ጨ": ["ጨ","ጩ","ጪ","ጫ","ጬ","ጭ","ጮ"],
        "ጰ": ["ጰ","ጱ","ጲ","ጳ","ጴ","ጵ","ጶ"],
        "ጸ": ["ጸ","ጹ","ጺ","ጻ","ጼ","ጽ","ጾ"],
        "ፀ": ["ፀ","ፁ","ፂ","ፃ","ፄ","ፅ","ፆ"],
        "ፈ": ["ፈ","ፉ","ፊ","ፋ","ፌ","ፍ","ፎ"],
        "ፐ": ["ፐ","ፑ","ፒ","ፓ","ፔ","ፕ","ፖ"]
    };
    
    function buildAmharic() {
        let list = [];
        let order = 1;
        for (let base of Object.keys(amharicFamilyMap)) {
            for (let char of amharicFamilyMap[base]) {
                list.push({ char: char, order: order++, base: base });
            }
        }
        return list;
    }
    
    const AMHARIC = buildAmharic();
    const ENGLISH = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').map((c, i) => ({ char: c, order: i + 1, base: "EN" }));
    const NUMBERS = Array.from({ length: 1000 }, (_, i) => ({ char: (i + 1).toString(), order: i + 1, base: "NUM" }));
    
    let currentUser = null;
    let currentMode = "amharic";
    let currentData = AMHARIC;
    let currentQ = null;
    let waiting = false;
    let streak = 0;
    let total = 0;
    
    // Get the NEXT item in correct sequence
    function getNextItem(item) {
        let nextOrder = item.order + 1;
        let next = currentData.find(i => i.order === nextOrder);
        if (!next && currentData.length > 0) {
            // If at the end, show first item as next
            next = currentData[0];
        }
        return next;
    }
    
    // Generate new question with accurate "after" logic
    function newQuestion() {
        let maxOrder = Math.max(...currentData.map(i => i.order));
        let candidates = currentData.filter(i => i.order < maxOrder);
        if (candidates.length === 0) candidates = currentData.slice(0, -1);
        
        let base = candidates[Math.floor(Math.random() * candidates.length)];
        let correct = getNextItem(base);
        
        // Get unique wrong answers (not the base, not the correct)
        let wrongPool = currentData.filter(i => i.char !== correct.char && i.char !== base.char);
        let shuffled = [...wrongPool].sort(() => Math.random() - 0.5);
        let wrongs = shuffled.slice(0, 3);
        
        let options = [correct, ...wrongs];
        // Shuffle options
        for (let i = options.length - 1; i > 0; i--) {
            let j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        
        return { base, correct, options };
    }
    
    // Render game with drag-and-drop
    function render() {
        if (!currentQ) currentQ = newQuestion();
        
        document.getElementById("currentQuestion").innerText = currentQ.base.char;
        
        let container = document.getElementById("optionsContainer");
        container.innerHTML = "";
        
        currentQ.options.forEach(opt => {
            let btn = document.createElement("div");
            btn.className = "option";
            btn.innerText = opt.char;
            btn.setAttribute("data-value", opt.char);
            btn.setAttribute("draggable", "true");
            
            // Drag start
            btn.addEventListener("dragstart", function(e) {
                e.dataTransfer.setData("text/plain", opt.char);
                e.dataTransfer.effectAllowed = "copy";
                this.classList.add("dragging");
            });
            
            btn.addEventListener("dragend", function(e) {
                this.classList.remove("dragging");
            });
            
            // Touch support for mobile
            btn.addEventListener("touchstart", function(e) {
                let touch = e.touches[0];
                this.setAttribute("data-touch-value", opt.char);
                this.classList.add("dragging");
            });
            
            btn.addEventListener("touchmove", function(e) {
                e.preventDefault();
                let touch = e.touches[0];
                let element = document.elementFromPoint(touch.clientX, touch.clientY);
                if (element && element.classList && element.classList.contains("answer-zone")) {
                    document.getElementById("answerZone").classList.add("drag-over");
                }
            });
            
            btn.addEventListener("touchend", function(e) {
                this.classList.remove("dragging");
                document.getElementById("answerZone").classList.remove("drag-over");
                let value = this.getAttribute("data-touch-value");
                if (value && !waiting) {
                    let selected = currentQ.options.find(o => o.char === value);
                    if (selected) checkAnswer(selected);
                }
            });
            
            container.appendChild(btn);
        });
        
        // Setup drop zone
        let dropZone = document.getElementById("answerZone");
        dropZone.addEventListener("dragover", function(e) {
            e.preventDefault();
            this.classList.add("drag-over");
        });
        
        dropZone.addEventListener("dragleave", function(e) {
            this.classList.remove("drag-over");
        });
        
        dropZone.addEventListener("drop", function(e) {
            e.preventDefault();
            this.classList.remove("drag-over");
            let droppedChar = e.dataTransfer.getData("text/plain");
            if (droppedChar && !waiting) {
                let selected = currentQ.options.find(o => o.char === droppedChar);
                if (selected) checkAnswer(selected);
            }
        });
        
        // Also allow click/tap on options (fallback)
        document.querySelectorAll(".option").forEach(opt => {
            opt.onclick = () => {
                if (!waiting) {
                    let value = opt.innerText;
                    let selected = currentQ.options.find(o => o.char === value);
                    if (selected) checkAnswer(selected);
                }
            };
        });
        
        document.getElementById("feedbackMsg").innerHTML = "";
        waiting = false;
        document.getElementById("progressTracker").innerHTML = `⭐ Streak: ${streak} | ✅ Total: ${total} ⭐`;
        
        // Reset answer zone
        document.getElementById("answerPlaceholder").classList.remove("hide");
        document.getElementById("selectedAnswer").classList.add("hide");
        document.getElementById("selectedAnswer").innerHTML = "";
    }
    
    async function checkAnswer(selected) {
        if (waiting) return;
        waiting = true;
        
        let isCorrect = (selected.char === currentQ.correct.char);
        let feedbackDiv = document.getElementById("feedbackMsg");
        
        // Show selected answer in drop zone
        document.getElementById("answerPlaceholder").classList.add("hide");
        let selectedDiv = document.getElementById("selectedAnswer");
        selectedDiv.classList.remove("hide");
        selectedDiv.innerHTML = selected.char;
        
        if (isCorrect) {
            feedbackDiv.innerHTML = "<span class='correct'>✅ ትክክል! ጥሩ! ✅ Correct!</span>";
            streak++;
            total++;
            if (currentUser) {
                try {
                    await db.collection("users").doc(currentUser.uid).update({
                        [`progress.${currentMode}.streak`]: streak,
                        [`progress.${currentMode}.totalCorrect`]: firebase.firestore.FieldValue.increment(1),
                        lastActive: new Date().toISOString()
                    });
                } catch(e) { console.log("save error", e); }
            }
        } else {
            feedbackDiv.innerHTML = `<span class='wrong'>❌ ተሳስተሃል! ትክክለኛው: ${currentQ.correct.char} ❌</span>`;
            streak = 0;
        }
        
        document.getElementById("progressTracker").innerHTML = `⭐ Streak: ${streak} | ✅ Total: ${total} ⭐`;
        
        // Disable all options
        document.querySelectorAll(".option").forEach(opt => {
            opt.style.opacity = "0.5";
            opt.style.pointerEvents = "none";
            opt.setAttribute("draggable", "false");
        });
    }
    
    function next() {
        currentQ = newQuestion();
        document.querySelectorAll(".option").forEach(opt => {
            opt.style.opacity = "1";
            opt.style.pointerEvents = "auto";
            opt.setAttribute("draggable", "true");
        });
        render();
    }
    
    function switchMode(mode) {
        currentMode = mode;
        if (mode === "amharic") currentData = AMHARIC;
        else if (mode === "english") currentData = ENGLISH;
        else currentData = NUMBERS;
        
        streak = 0;
        total = 0;
        currentQ = null;
        render();
    }
    
    // Auth UI (same as before)
    document.getElementById("showSignup").onclick = () => {
        document.getElementById("loginForm").classList.add("hide");
        document.getElementById("signupForm").classList.remove("hide");
    };
    document.getElementById("showLogin").onclick = () => {
        document.getElementById("signupForm").classList.add("hide");
        document.getElementById("loginForm").classList.remove("hide");
    };
    
    document.getElementById("signupBtn").onclick = async () => {
        let name = document.getElementById("signupName").value.trim();
        let email = document.getElementById("signupEmail").value.trim();
        let pass = document.getElementById("signupPassword").value;
        if (!name || !email || !pass) { alert("Fill all fields"); return; }
        if (pass.length < 6) { alert("Password min 6 characters"); return; }
        try {
            let cred = await auth.createUserWithEmailAndPassword(email, pass);
            await db.collection("users").doc(cred.user.uid).set({
                name: name, email: email, createdAt: new Date().toISOString(),
                progress: { amharic: { streak: 0, totalCorrect: 0 }, english: { streak: 0, totalCorrect: 0 }, numbers: { streak: 0, totalCorrect: 0 } }
            });
            currentUser = cred.user;
            document.getElementById("authSection").classList.add("hide");
            document.getElementById("learningSection").classList.remove("hide");
            document.getElementById("userNameDisplay").innerText = name;
            switchMode("amharic");
        } catch(e) { alert("Signup error: " + e.message); }
    };
    
    document.getElementById("loginBtn").onclick = async () => {
        let email = document.getElementById("loginEmail").value.trim();
        let pass = document.getElementById("loginPassword").value;
        if (!email || !pass) { alert("Enter email and password"); return; }
        try {
            let cred = await auth.signInWithEmailAndPassword(email, pass);
            let doc = await db.collection("users").doc(cred.user.uid).get();
            let name = doc.exists ? doc.data().name : email.split('@')[0];
            currentUser = cred.user;
            document.getElementById("authSection").classList.add("hide");
            document.getElementById("learningSection").classList.remove("hide");
            document.getElementById("userNameDisplay").innerText = name;
            switchMode("amharic");
        } catch(e) { alert("Login failed: " + e.message); }
    };
    
    document.getElementById("logoutBtn").onclick = async () => {
        await auth.signOut();
        currentUser = null;
        document.getElementById("authSection").classList.remove("hide");
        document.getElementById("learningSection").classList.add("hide");
        document.getElementById("loginForm").classList.remove("hide");
        document.getElementById("signupForm").classList.add("hide");
    };
    
    document.querySelectorAll(".mode-btn").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            switchMode(btn.getAttribute("data-mode"));
        };
    });
    document.getElementById("nextBtn").onclick = () => next();
    
    console.log("✅ Tsehay Academy with DRAG & DROP! Fixed letter sequence!");
</script>
</body>
</html>
