<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ጸሀይ ትምህርት - Tsehay Learning: Amharic 7 Orders, English, Numbers 1-1000</title>
    <!-- Firebase SDKs -->
    <script type="module">
        // 🔥 REPLACE WITH YOUR FIREBASE CONFIG 🔥
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPhoneNumber, RecaptchaVerifier, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        window.appState = { auth, db, signInWithPhoneNumber, RecaptchaVerifier, onAuthStateChanged, doc, setDoc, getDoc, updateDoc, arrayUnion };
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Comic Neue', 'Noto Sans Ethiopic', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #f9a826 0%, #fdd97a 50%, #ffefb5 100%);
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        /* 🌞 RISING SUN ANIMATION (TSEHAY) */
        .sun {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #ffdd77, #ffaa33);
            border-radius: 50%;
            box-shadow: 0 0 60px #ffaa44;
            z-index: 0;
            animation: riseSun 4s ease-out forwards, glowPulse 3s infinite alternate;
        }

        @keyframes riseSun {
            0% {
                bottom: -150px;
                width: 120px;
                height: 120px;
                opacity: 0.6;
            }
            100% {
                bottom: 20px;
                width: 220px;
                height: 220px;
                opacity: 1;
            }
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 20px #ffaa44; transform: translateX(-50%) scale(1);}
            100% { box-shadow: 0 0 80px #ffcc66; transform: translateX(-50%) scale(1.02);}
        }

        .sun-rays {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, rgba(255,215,0,0.1) 0px, rgba(255,215,0,0.1) 40px, rgba(255,200,0,0.05) 40px, rgba(255,200,0,0.05) 80px);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 700px;
            margin: 0 auto;
            background: rgba(255, 248, 225, 0.96);
            border-radius: 64px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2), inset 0 1px 2px rgba(255,255,200,0.8);
            backdrop-filter: blur(3px);
        }

        h1 {
            text-align: center;
            font-size: 2.2rem;
            color: #b45f06;
            text-shadow: 2px 2px 0 #ffdd99;
            margin-bottom: 8px;
        }

        .tsehay-logo {
            text-align: center;
            font-size: 48px;
            margin: 8px 0;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            color: #7a4b03;
        }

        input, select {
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            border: 2px solid #ffc857;
            font-size: 16px;
            background: white;
        }

        button {
            background: #f39c12;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 0 #b45f06;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #b45f06;
        }

        .mode-buttons {
            display: flex;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .mode-btn {
            flex: 1;
            background: #ffd966;
            color: #5a3a01;
        }

        .mode-btn.active {
            background: #e67e22;
            color: white;
            box-shadow: 0 0 10px orange;
        }

        .game-area {
            background: #fff6e5;
            border-radius: 48px;
            padding: 20px;
            text-align: center;
            border: 3px solid #ffcc77;
        }

        .question-card {
            font-size: 80px;
            background: #ffefcf;
            display: inline-block;
            padding: 20px 40px;
            border-radius: 60px;
            margin: 10px;
            font-weight: bold;
            font-family: 'Noto Sans Ethiopic', monospace;
            box-shadow: inset 0 -2px 0 #ddb56b, 0 10px 20px rgba(0,0,0,0.1);
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
            margin-top: 24px;
        }

        .option {
            background: #fffaec;
            padding: 14px 20px;
            border-radius: 60px;
            font-size: 36px;
            cursor: pointer;
            transition: 0.05s linear;
            min-width: 90px;
            text-align: center;
            font-weight: bold;
            border: 2px solid #ffbb55;
            font-family: 'Noto Sans Ethiopic', monospace;
        }

        .option:active {
            transform: scale(0.94);
            background: #ffe0a3;
        }

        .feedback {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }

        .correct {
            color: #2b7a2b;
            text-shadow: 0 0 3px #aaffaa;
        }

        .wrong {
            color: #c0392b;
        }

        .progress {
            font-size: 16px;
            background: #ffefcf;
            border-radius: 40px;
            padding: 8px;
            margin-top: 16px;
        }

        .hide {
            display: none;
        }

        .logout {
            background: #c0392b;
            margin-top: 10px;
            font-size: 14px;
            width: auto;
            padding: 8px 16px;
        }

        @media (max-width: 550px) {
            .question-card {
                font-size: 48px;
                padding: 12px 24px;
            }
            .option {
                font-size: 28px;
                padding: 8px 16px;
                min-width: 70px;
            }
        }
    </style>
</head>
<body>
<div class="sun"></div>
<div class="sun-rays"></div>
<div class="container" id="app">
    <!-- REGISTRATION SECTION -->
    <div id="authSection">
        <div class="tsehay-logo">🌞 ጸሀይ 🌞</div>
        <h1>Tsehay Academy</h1>
        <div class="sub" style="text-align: center; margin-bottom: 20px;">Amharic 7 Orders • English • Numbers 1-1000</div>
        <div class="input-group">
            <label>👧🧒 Student Full Name</label>
            <input type="text" id="studentName" placeholder="e.g., Selam, Dawit">
        </div>
        <div class="input-group">
            <label>📱 Mobile Number (with country code)</label>
            <input type="tel" id="phoneNumber" placeholder="+251912345678" value="+251">
        </div>
        <div id="recaptcha-container"></div>
        <button id="sendOtpBtn">🌅 Register & Send OTP</button>
        <div class="input-group hide" id="otpGroup">
            <label>🔐 Verification Code</label>
            <input type="text" id="otpCode" placeholder="123456">
            <button id="verifyBtn">✅ Verify & Start Learning</button>
        </div>
    </div>

    <!-- MAIN LEARNING DASHBOARD -->
    <div id="learningSection" class="hide">
        <div style="display: flex; justify-content: space-between; align-items: baseline;">
            <h2>☀️ ጤና ይስጥልኝ, <span id="userNameDisplay"></span>!</h2>
            <button id="logoutBtn" class="logout">🚪 Exit</button>
        </div>
        <div class="mode-buttons">
            <button data-mode="amharic" class="mode-btn active">🇪🇹 አማርኛ (7 ቅደም)</button>
            <button data-mode="english" class="mode-btn">🔤 English ABC</button>
            <button data-mode="numbers" class="mode-btn">🔢 ቁጥር 1 - 1000</button>
        </div>
        <div class="game-area">
            <div style="font-size: 18px;">🧠 ቀጥሎ የሚመጣው የትኛው ነው? <br> "Which comes after?"</div>
            <div class="question-card" id="currentQuestion">?</div>
            <div class="options" id="optionsContainer"></div>
            <div class="feedback" id="feedbackMsg"></div>
            <div class="progress" id="progressTracker">⭐ Streak: 0 ⭐</div>
            <button id="nextBtn">✨ ቀጣይ / Next ✨</button>
        </div>
        <div style="margin-top: 16px; text-align: center; font-size: 13px;">💡 ጸሀይ ትምህርት - በቅደም ተማር (Learn in order)</div>
    </div>
</div>

<script type="module">
    // ======================= 1. BUILD MASTER DATASETS =======================
    // --- Amharic 7 Orders for each base fidel (ሀ ሁ ሂ ሃ ሄ ህ ሆ)
    const amharicBases = [
        "ሀ", "ለ", "ሐ", "መ", "ሠ", "ረ", "ሰ", "ሸ", "ቀ", "በ", "ተ", "ቸ", "ኀ", "ነ", "ኘ", "አ", "ከ", "ኸ", "ወ", "ዐ", "ዘ", "ዠ", "የ", "ደ", "ጀ", "ገ", "ጠ", "ጨ", "ጰ", "ጸ", "ፀ", "ፈ", "ፐ"
    ];
    // The 7 orders pattern (vowel orders)
    const orders7 = ["", "ሁ", "ሂ", "ሃ", "ሄ", "ህ", "ሆ"]; // first is base itself
    
    function generateFullAmharic() {
        let fullList = [];
        for (let base of amharicBases) {
            // First character is base (order 1)
            fullList.push({ char: base, order: fullList.length + 1, group: base });
            // then append the 6 other forms using ethiopic unicode logic: we map manually for correctness
            // We'll construct using known mappings for each family
            const familyMap = {
                "ሀ": ["ሀ","ሁ","ሂ","ሃ","ሄ","ህ","ሆ"], "ለ":["ለ","ሉ","ሊ","ላ","ሌ","ል","ሎ"], "ሐ":["ሐ","ሑ","ሒ","ሓ","ሔ","ሕ","ሖ"],
                "መ":["መ","ሙ","ሚ","ማ","ሜ","ም","ሞ"], "ሠ":["ሠ","ሡ","ሢ","ሣ","ሤ","ሥ","ሦ"], "ረ":["ረ","ሩ","ሪ","ራ","ሬ","ር","ሮ"],
                "ሰ":["ሰ","ሱ","ሲ","ሳ","ሴ","ስ","ሶ"], "ሸ":["ሸ","ሹ","ሺ","ሻ","ሼ","ሽ","ሾ"], "ቀ":["ቀ","ቁ","ቂ","ቃ","ቄ","ቅ","ቆ"],
                "በ":["በ","ቡ","ቢ","ባ","ቤ","ብ","ቦ"], "ተ":["ተ","ቱ","ቲ","ታ","ቴ","ት","ቶ"], "ቸ":["ቸ","ቹ","ቺ","ቻ","ቼ","ች","ቾ"],
                "ኀ":["ኀ","ኁ","ኂ","ኃ","ኄ","ኅ","ኆ"], "ነ":["ነ","ኑ","ኒ","ና","ኔ","ን","ኖ"], "ኘ":["ኘ","ኙ","ኚ","ኛ","ኜ","ኝ","ኞ"],
                "አ":["አ","ኡ","ኢ","ኣ","ኤ","እ","ኦ"], "ከ":["ከ","ኩ","ኪ","ካ","ኬ","ክ","ኮ"], "ኸ":["ኸ","ኹ","ኺ","ኻ","ኼ","ኽ","ኾ"],
                "ወ":["ወ","ዉ","ዊ","ዋ","ዌ","ው","ዎ"], "ዐ":["ዐ","ዑ","ዒ","ዓ","ዔ","ዕ","ዖ"], "ዘ":["ዘ","ዙ","ዚ","ዛ","ዜ","ዝ","ዞ"],
                "ዠ":["ዠ","ዡ","ዢ","ዣ","ዤ","ዥ","ዦ"], "የ":["የ","ዩ","ዪ","ያ","ዬ","ይ","ዮ"], "ደ":["ደ","ዱ","ዲ","ዳ","ዴ","ድ","ዶ"],
                "ጀ":["ጀ","ጁ","ጂ","ጃ","ጄ","ጅ","ጆ"], "ገ":["ገ","ጉ","ጊ","ጋ","ጌ","ግ","ጎ"], "ጠ":["ጠ","ጡ","ጢ","ጣ","ጤ","ጥ","ጦ"],
                "ጨ":["ጨ","ጩ","ጪ","ጫ","ጬ","ጭ","ጮ"], "ጰ":["ጰ","ጱ","ጲ","ጳ","ጴ","ጵ","ጶ"], "ጸ":["ጸ","ጹ","ጺ","ጻ","ጼ","ጽ","ጾ"],
                "ፀ":["ፀ","ፁ","ፂ","ፃ","ፄ","ፅ","ፆ"], "ፈ":["ፈ","ፉ","ፊ","ፋ","ፌ","ፍ","ፎ"], "ፐ":["ፐ","ፑ","ፒ","ፓ","ፔ","ፕ","ፖ"]
            };
            if (familyMap[base]) {
                for (let i = 1; i < familyMap[base].length; i++) {
                    fullList.push({ char: familyMap[base][i], order: fullList.length + 1, group: base });
                }
            } else {
                // fallback using vowels for unknown
                for (let i = 1; i <= 6; i++) {
                    fullList.push({ char: base + String.fromCodePoint(0x1350 + i), order: fullList.length + 1, group: base });
                }
            }
        }
        return fullList;
    }
    
    const AMHARIC_FULL = generateFullAmharic(); // total ~ 33*7 = 231 characters
    const ENGLISH_LETTERS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').map((ch, idx) => ({ char: ch, order: idx+1, group: "EN" }));
    const NUMBERS_1_1000 = Array.from({length: 1000}, (_, i) => ({ char: (i+1).toString(), order: i+1, group: "NUM" }));
    
    let currentUser = null;
    let currentMode = "amharic";
    let currentDataset = AMHARIC_FULL;
    let currentQuestionItem = null;
    let currentOptions = [];
    let waitingForNext = false;
    let scoreStreak = 0;
    
    function getNextItem(item) {
        let nextOrder = item.order + 1;
        let nextItem = currentDataset.find(i => i.order === nextOrder);
        if (!nextItem && currentDataset.length > 0) return currentDataset[0];
        return nextItem;
    }
    
    function generateNewQuestion() {
        let maxOrder = Math.max(...currentDataset.map(i => i.order));
        let candidates = currentDataset.filter(i => i.order < maxOrder);
        if (candidates.length === 0) candidates = [...currentDataset];
        const randomItem = candidates[Math.floor(Math.random() * candidates.length)];
        const correctNext = getNextItem(randomItem);
        if (!correctNext) return generateNewQuestion();
        
        let dists = currentDataset.filter(i => i.char !== correctNext.char && i.char !== randomItem.char);
        dists = dists.sort(() => 0.5 - Math.random()).slice(0, 3);
        let opts = [correctNext, ...dists];
        opts = opts.sort(() => 0.5 - Math.random());
        
        currentQuestionItem = { questionBase: randomItem, correct: correctNext };
        currentOptions = opts;
        return { questionBase: randomItem, correct: correctNext, options: opts };
    }
    
    function renderGame() {
        if (!currentQuestionItem) {
            let q = generateNewQuestion();
            currentQuestionItem = q;
            currentOptions = q.options;
        }
        document.getElementById("currentQuestion").innerText = currentQuestionItem.questionBase.char;
        const optsDiv = document.getElementById("optionsContainer");
        optsDiv.innerHTML = "";
        currentOptions.forEach(opt => {
            const btn = document.createElement("div");
            btn.className = "option";
            btn.innerText = opt.char;
            btn.onclick = () => handleAnswer(opt);
            optsDiv.appendChild(btn);
        });
        document.getElementById("feedbackMsg").innerHTML = "";
        document.getElementById("nextBtn").disabled = false;
        waitingForNext = false;
        document.getElementById("progressTracker").innerHTML = `☀️ Streak: ${scoreStreak} correct ☀️`;
    }
    
    async function handleAnswer(selected) {
        if (waitingForNext) return;
        const correct = currentQuestionItem.correct;
        const fbDiv = document.getElementById("feedbackMsg");
        if (selected.char === correct.char) {
            fbDiv.innerHTML = "<span class='correct'>✅ ትክክል! ጥሩ! ✅</span>";
            scoreStreak++;
            if (currentUser) {
                const userRef = window.appState.doc(window.appState.db, "users", currentUser.uid);
                await window.appState.updateDoc(userRef, {
                    [`progress.${currentMode}.lastCorrect`]: new Date(),
                    [`progress.${currentMode}.streak`]: scoreStreak,
                }).catch(e=>console.log);
            }
        } else {
            fbDiv.innerHTML = `<span class='wrong'>❌ ተሳስተሃል! ትክክለኛው: ${correct.char} ❌</span>`;
            scoreStreak = 0;
        }
        waitingForNext = true;
        document.getElementById("progressTracker").innerHTML = `☀️ Streak: ${scoreStreak} correct ☀️`;
    }
    
    document.getElementById("nextBtn").onclick = () => {
        const newQ = generateNewQuestion();
        currentQuestionItem = newQ;
        currentOptions = newQ.options;
        renderGame();
    };
    
    function switchMode(mode) {
        currentMode = mode;
        if (mode === "amharic") currentDataset = AMHARIC_FULL;
        else if (mode === "english") currentDataset = ENGLISH_LETTERS;
        else currentDataset = NUMBERS_1_1000;
        scoreStreak = 0;
        currentQuestionItem = null;
        renderGame();
    }
    
    // Firebase Auth
    window.initRecaptcha = () => new window.appState.RecaptchaVerifier('recaptcha-container', { size: 'invisible' });
    
    document.getElementById("sendOtpBtn").onclick = async () => {
        const phone = document.getElementById("phoneNumber").value.trim();
        const name = document.getElementById("studentName").value.trim();
        if (!phone || !name) { alert("Please enter name and mobile number"); return; }
        if (!phone.startsWith("+")) { alert("Use country code like +251..."); return; }
        const recaptcha = window.initRecaptcha();
        window.recaptchaVerifier = recaptcha;
        try {
            const confirmation = await window.appState.signInWithPhoneNumber(window.appState.auth, phone, recaptcha);
            window.confirmationResult = confirmation;
            document.getElementById("otpGroup").classList.remove("hide");
            alert("OTP sent! ☀️");
        } catch(e) { alert("Error: " + e.message); }
    };
    
    document.getElementById("verifyBtn").onclick = async () => {
        const otp = document.getElementById("otpCode").value;
        const name = document.getElementById("studentName").value.trim();
        if (!otp) return;
        try {
            const result = await window.confirmationResult.confirm(otp);
            const user = result.user;
            const userRef = window.appState.doc(window.appState.db, "users", user.uid);
            const snap = await window.appState.getDoc(userRef);
            if (!snap.exists()) {
                await window.appState.setDoc(userRef, { name, phone: user.phoneNumber, createdAt: new Date(), progress: {} });
            }
            currentUser = user;
            document.getElementById("authSection").classList.add("hide");
            document.getElementById("learningSection").classList.remove("hide");
            document.getElementById("userNameDisplay").innerText = name;
            switchMode("amharic");
        } catch(e) { alert("Wrong OTP: " + e.message); }
    };
    
    document.getElementById("logoutBtn").onclick = () => {
        window.appState.auth.signOut();
        location.reload();
    };
    
    document.querySelectorAll(".mode-btn").forEach(btn => {
        btn.onclick = (e) => {
            document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            switchMode(btn.getAttribute("data-mode"));
        };
    });
    
    window.appState.onAuthStateChanged(window.appState.auth, (user) => {
        if (!user && !document.getElementById("authSection").classList.contains("hide")) return;
        if (!user && document.getElementById("learningSection")) {
            document.getElementById("authSection").classList.remove("hide");
            document.getElementById("learningSection").classList.add("hide");
        }
    });
</script>
</body>
</html>
