<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Noto Sans Ethiopic', system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #f9a826 0%, #fdd97a 50%, #ffefb5 100%);
            position: relative;
            padding: 20px;
        }

        .sun {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #ffdd77, #ffaa33);
            border-radius: 50%;
            box-shadow: 0 0 60px #ffaa44;
            z-index: 0;
            animation: glowPulse 3s infinite alternate;
            pointer-events: none;
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 20px #ffaa44; transform: translateX(-50%) scale(1);}
            100% { box-shadow: 0 0 80px #ffcc66; transform: translateX(-50%) scale(1.02);}
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 750px;
            margin: 0 auto;
            background: rgba(255, 248, 225, 0.96);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        h1 { text-align: center; font-size: 1.8rem; color: #b45f06; }
        .tsehay-logo { text-align: center; font-size: 40px; margin: 8px 0; }
        
        .input-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #7a4b03; }
        input { width: 100%; padding: 14px; border-radius: 60px; border: 2px solid #ffc857; font-size: 16px; background: white; }
        button { background: #f39c12; color: white; border: none; padding: 14px 20px; border-radius: 60px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        
        .mode-buttons { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
        .mode-btn { flex: 1; background: #ffd966; color: #5a3a01; font-size: 14px; padding: 12px; text-align: center; cursor: pointer; border-radius: 40px; }
        .mode-btn.active { background: #e67e22; color: white; }
        
        .stage-info {
            background: #ffefcf;
            border-radius: 40px;
            padding: 15px;
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .stage-badge {
            background: #e67e22;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
        }
        .progress-bar {
            flex: 1;
            height: 20px;
            background: #ffd966;
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #2e7d32;
            width: 0%;
            transition: width 0.3s;
            border-radius: 20px;
        }
        
        .game-area {
            background: #fff6e5;
            border-radius: 48px;
            padding: 25px;
            text-align: center;
            border: 3px solid #ffcc77;
        }
        
        .sequence-pattern {
            font-size: 60px;
            background: #ffefcf;
            padding: 30px;
            border-radius: 60px;
            margin: 15px 0;
            font-weight: bold;
            letter-spacing: 20px;
        }
        
        .missing-spot {
            display: inline-block;
            width: 80px;
            height: 80px;
            background: #ffe0a3;
            border-radius: 20px;
            margin: 0 10px;
            vertical-align: middle;
            line-height: 80px;
            text-align: center;
            font-size: 50px;
            color: #e67e22;
        }
        
        .options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
        }
        
        .option {
            background: #fffaec;
            padding: 15px 25px;
            border-radius: 60px;
            font-size: 40px;
            cursor: pointer;
            min-width: 90px;
            text-align: center;
            font-weight: bold;
            border: 3px solid #ffbb55;
            transition: 0.1s;
        }
        .option:active { transform: scale(0.95); background: #ffe0a3; }
        .option.disabled { opacity: 0.5; pointer-events: none; }
        
        .feedback { margin: 15px 0; font-size: 24px; font-weight: bold; min-height: 70px; }
        .correct { color: #2b7a2b; }
        .wrong { color: #c0392b; }
        
        .next-btn { background: #2e7d32; margin-top: 10px; }
        .logout { background: #c0392b; width: auto; padding: 8px 16px; margin-top: 0; }
        .auth-toggle { text-align: center; margin-top: 15px; color: #7a4b03; cursor: pointer; }
        .auth-toggle span { text-decoration: underline; font-weight: bold; }
        
        .hide { display: none; }
        
        @media (max-width: 550px) {
            .sequence-pattern { font-size: 35px; letter-spacing: 10px; padding: 20px; }
            .option { font-size: 30px; padding: 10px 18px; min-width: 70px; }
        }
    </style>
</head>
<body>
<div class="sun"></div>
<div class="container" id="app">
    <!-- AUTH SECTION -->
    <div id="authSection">
        <div class="tsehay-logo">🌞 ጸሀይ 🌞</div>
        <h1>Tsehay Academy</h1>
        <div style="text-align: center; margin-bottom: 20px;">Stage Learning • Derja • Sequential Mastery</div>
        
        <div id="loginForm">
            <div class="input-group">
                <label>📧 Email Address</label>
                <input type="email" id="loginEmail" placeholder="student@example.com">
            </div>
            <div class="input-group">
                <label>🔒 Password</label>
                <input type="password" id="loginPassword" placeholder="password (min 6 chars)">
            </div>
            <button id="loginBtn">🔑 Login</button>
            <div class="auth-toggle">New student? <span id="showSignup">Create an account here</span></div>
        </div>
        
        <div id="signupForm" class="hide">
            <div class="input-group">
                <label>👧🧒 Student Name</label>
                <input type="text" id="signupName" placeholder="e.g., Selam, Dawit">
            </div>
            <div class="input-group">
                <label>📧 Email Address</label>
                <input type="email" id="signupEmail" placeholder="student@example.com">
            </div>
            <div class="input-group">
                <label>🔒 Password (minimum 6 characters)</label>
                <input type="password" id="signupPassword" placeholder="password">
            </div>
            <button id="signupBtn">📝 Register & Start</button>
            <div class="auth-toggle">Already have an account? <span id="showLogin">Login here</span></div>
        </div>
    </div>

    <!-- LEARNING SECTION -->
    <div id="learningSection" class="hide">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <h2>☀️ ጤና ይስጥልኝ, <span id="userNameDisplay"></span>!</h2>
            <button id="logoutBtn" class="logout">🚪 Exit</button>
        </div>
        
        <div class="mode-buttons">
            <button data-mode="amharic" class="mode-btn active">🇪🇹 አማርኛ (7 Orders)</button>
            <button data-mode="english" class="mode-btn">🔤 English ABC</button>
            <button data-mode="numbers" class="mode-btn">🔢 ቁጥር 1-1000</button>
        </div>
        
        <div class="stage-info">
            <div class="stage-badge" id="stageDisplay">Derja 1</div>
            <div class="progress-bar"><div class="progress-fill" id="stageProgress"></div></div>
            <div style="font-weight: bold;" id="masteryDisplay">⭐ 0% Mastered</div>
        </div>
        
        <div class="game-area">
            <div style="font-size: 16px; margin-bottom: 10px;">🧠 Complete the sequence / ቅደሙን ሙላ</div>
            <div class="sequence-pattern" id="sequencePattern">ሀ ___ ሂ</div>
            <div class="options" id="optionsContainer"></div>
            <div class="feedback" id="feedbackMsg"></div>
            <button id="nextBtn" class="next-btn">✨ Next Question ✨</button>
        </div>
    </div>
</div>

<script>
    // ======================= FIREBASE CONFIG =======================
    const firebaseConfig = {
        apiKey: "AIzaSyCxZFWBiuWqK73EUMznAlySXrsC1EPb1BE",

    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    // ======================= STAGE DATA =======================
    // Amharic: Each stage = one family (7 letters)
    const AMHARIC_STAGES = [
        { name: "ሀ ቤተሰብ", letters: ["ሀ","ሁ","ሂ","ሃ","ሄ","ህ","ሆ"] },
        { name: "ለ ቤተሰብ", letters: ["ለ","ሉ","ሊ","ላ","ሌ","ል","ሎ"] },
        { name: "ሐ ቤተሰብ", letters: ["ሐ","ሑ","ሒ","ሓ","ሔ","ሕ","ሖ"] },
        { name: "መ ቤተሰብ", letters: ["መ","ሙ","ሚ","ማ","ሜ","ም","ሞ"] },
        { name: "ሠ ቤተሰብ", letters: ["ሠ","ሡ","ሢ","ሣ","ሤ","ሥ","ሦ"] },
        { name: "ረ ቤተሰብ", letters: ["ረ","ሩ","ሪ","ራ","ሬ","ር","ሮ"] },
        { name: "ሰ ቤተሰብ", letters: ["ሰ","ሱ","ሲ","ሳ","ሴ","ስ","ሶ"] },
        { name: "ሸ ቤተሰብ", letters: ["ሸ","ሹ","ሺ","ሻ","ሼ","ሽ","ሾ"] },
        { name: "ቀ ቤተሰብ", letters: ["ቀ","ቁ","ቂ","ቃ","ቄ","ቅ","ቆ"] },
        { name: "በ ቤተሰብ", letters: ["በ","ቡ","ቢ","ባ","ቤ","ብ","ቦ"] },
        { name: "ተ ቤተሰብ", letters: ["ተ","ቱ","ቲ","ታ","ቴ","ት","ቶ"] },
        { name: "ቸ ቤተሰብ", letters: ["ቸ","ቹ","ቺ","ቻ","ቼ","ች","ቾ"] },
        { name: "ኀ ቤተሰብ", letters: ["ኀ","ኁ","ኂ","ኃ","ኄ","ኅ","ኆ"] },
        { name: "ነ ቤተሰብ", letters: ["ነ","ኑ","ኒ","ና","ኔ","ን","ኖ"] },
        { name: "ኘ ቤተሰብ", letters: ["ኘ","ኙ","ኚ","ኛ","ኜ","ኝ","ኞ"] },
        { name: "አ ቤተሰብ", letters: ["አ","ኡ","ኢ","ኣ","ኤ","እ","ኦ"] },
        { name: "ከ ቤተሰብ", letters: ["ከ","ኩ","ኪ","ካ","ኬ","ክ","ኮ"] },
        { name: "ኸ ቤተሰብ", letters: ["ኸ","ኹ","ኺ","ኻ","ኼ","ኽ","ኾ"] },
        { name: "ወ ቤተሰብ", letters: ["ወ","ዉ","ዊ","ዋ","ዌ","ው","ዎ"] },
        { name: "ዐ ቤተሰብ", letters: ["ዐ","ዑ","ዒ","ዓ","ዔ","ዕ","ዖ"] },
        { name: "ዘ ቤተሰብ", letters: ["ዘ","ዙ","ዚ","ዛ","ዜ","ዝ","ዞ"] },
        { name: "ዠ ቤተሰብ", letters: ["ዠ","ዡ","ዢ","ዣ","ዤ","ዥ","ዦ"] },
        { name: "የ ቤተሰብ", letters: ["የ","ዩ","ዪ","ያ","ዬ","ይ","ዮ"] },
        { name: "ደ ቤተሰብ", letters: ["ደ","ዱ","ዲ","ዳ","ዴ","ድ","ዶ"] },
        { name: "ጀ ቤተሰብ", letters: ["ጀ","ጁ","ጂ","ጃ","ጄ","ጅ","ጆ"] },
        { name: "ገ ቤተሰብ", letters: ["ገ","ጉ","ጊ","ጋ","ጌ","ግ","ጎ"] },
        { name: "ጠ ቤተሰብ", letters: ["ጠ","ጡ","ጢ","ጣ","ጤ","ጥ","ጦ"] },
        { name: "ጨ ቤተሰብ", letters: ["ጨ","ጩ","ጪ","ጫ","ጬ","ጭ","ጮ"] },
        { name: "ጰ ቤተሰብ", letters: ["ጰ","ጱ","ጲ","ጳ","ጴ","ጵ","ጶ"] },
        { name: "ጸ ቤተሰብ", letters: ["ጸ","ጹ","ጺ","ጻ","ጼ","ጽ","ጾ"] },
        { name: "ፀ ቤተሰብ", letters: ["ፀ","ፁ","ፂ","ፃ","ፄ","ፅ","ፆ"] },
        { name: "ፈ ቤተሰብ", letters: ["ፈ","ፉ","ፊ","ፋ","ፌ","ፍ","ፎ"] },
        { name: "ፐ ቤተሰብ", letters: ["ፐ","ፑ","ፒ","ፓ","ፔ","ፕ","ፖ"] }
    ];
    
    // English: Each stage = letters
    const ENGLISH_STAGES = [
        { name: "A B C D E F G", letters: ["A","B","C","D","E","F","G"] },
        { name: "H I J K L M N", letters: ["H","I","J","K","L","M","N"] },
        { name: "O P Q R S T U", letters: ["O","P","Q","R","S","T","U"] },
        { name: "V W X Y Z", letters: ["V","W","X","Y","Z"] }
    ];
    
    // Numbers: Each stage = 10 numbers
    const NUMBERS_STAGES = [];
    for (let i = 1; i <= 1000; i += 10) {
        let end = Math.min(i + 9, 1000);
        let letters = [];
        for (let j = i; j <= end; j++) letters.push(j.toString());
        NUMBERS_STAGES.push({ name: `${i} - ${end}`, letters: letters });
    }
    
    // ======================= GAME STATE =======================
    let currentUser = null;
    let currentMode = "amharic";
    let currentStages = AMHARIC_STAGES;
    let currentStageIndex = 0;
    let stageMastery = {};
    let currentQuestion = null;
    let waitingForNext = false;
    
    // Generate a question: show pattern with missing spot
    function generateQuestion() {
        const stage = currentStages[currentStageIndex];
        const letters = stage.letters;
        
        if (letters.length < 2) return null;
        
        // Random position to ask (0 = after first, 1 = between, etc.)
        const pos = Math.floor(Math.random() * (letters.length - 1));
        const first = letters[pos];
        const correct = letters[pos + 1];
        const second = letters[pos + 2] || "?";
        
        // Create pattern: e.g., "ሀ ___ ሂ" or "A ___ C" or "5 ___ 7"
        const pattern = `${first} ___ ${second}`;
        
        // Generate wrong options
        const wrongPool = [];
        for (let i = 0; i < letters.length; i++) {
            if (letters[i] !== correct && letters[i] !== first) {
                wrongPool.push(letters[i]);
            }
        }
        // Also add from previous stages
        if (currentStageIndex > 0) {
            currentStages[currentStageIndex - 1].letters.forEach(l => {
                if (!wrongPool.includes(l) && l !== correct && l !== first) wrongPool.push(l);
            });
        }
        
        const shuffled = [...wrongPool].sort(() => Math.random() - 0.5);
        const wrongs = shuffled.slice(0, 3);
        let options = [correct, ...wrongs];
        for (let i = options.length - 1; i > 0; i--) {
            let j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        
        return { pattern, correct, options, first, second };
    }
    
    function renderGame() {
        if (!currentQuestion) {
            currentQuestion = generateQuestion();
            if (!currentQuestion) return;
        }
        
        document.getElementById("sequencePattern").innerHTML = currentQuestion.pattern;
        
        const optionsDiv = document.getElementById("optionsContainer");
        optionsDiv.innerHTML = "";
        
        currentQuestion.options.forEach(opt => {
            const btn = document.createElement("div");
            btn.className = "option";
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(opt);
            optionsDiv.appendChild(btn);
        });
        
        document.getElementById("feedbackMsg").innerHTML = "";
        waitingForNext = false;
        
        // Update stage display
        const stage = currentStages[currentStageIndex];
        const masteredCount = stageMastery[`${currentMode}_stage_${currentStageIndex}`] || 0;
        const totalInStage = stage.letters.length;
        const stageProgress = Math.floor((masteredCount / totalInStage) * 100);
        
        document.getElementById("stageDisplay").innerHTML = `Derja ${currentStageIndex + 1}: ${stage.name}`;
        document.getElementById("stageProgress").style.width = `${stageProgress}%`;
        document.getElementById("masteryDisplay").innerHTML = `⭐ ${stageProgress}% Mastered`;
    }
    
    async function handleAnswer(selected) {
        if (waitingForNext) return;
        
        const isCorrect = (selected === currentQuestion.correct);
        const feedbackDiv = document.getElementById("feedbackMsg");
        
        if (isCorrect) {
            feedbackDiv.innerHTML = "<span class='correct'>✅ ትክክል! ጥሩ! ✅</span>";
            
            // Update mastery
            const stageKey = `${currentMode}_stage_${currentStageIndex}`;
            if (!stageMastery[stageKey]) stageMastery[stageKey] = 0;
            
            const stage = currentStages[currentStageIndex];
            const totalLetters = stage.letters.length;
            const currentMastered = stageMastery[stageKey];
            
            // Each correct answer increases mastery
            if (currentMastered < totalLetters) {
                stageMastery[stageKey] = Math.min(currentMastered + 1, totalLetters);
            }
            
            // Check if stage completed (100% mastery)
            if (stageMastery[stageKey] >= totalLetters) {
                if (currentStageIndex + 1 < currentStages.length) {
                    feedbackDiv.innerHTML += `<br><span class='correct'>🎉 Derja ${currentStageIndex + 1} ጨረስክ! ወደ ቀጣይ ደረጃ! 🎉</span>`;
                    currentStageIndex++;
                    // Initialize new stage mastery if needed
                    const newStageKey = `${currentMode}_stage_${currentStageIndex}`;
                    if (!stageMastery[newStageKey]) stageMastery[newStageKey] = 0;
                } else {
                    feedbackDiv.innerHTML += `<br><span class='correct'>🏆 ኮንግራትዩሌሽን! ሁሉንም ደረጃዎች ጨረስክ! 🏆</span>`;
                }
            }
            
            // Save progress to Firebase
            if (currentUser) {
                try {
                    await db.collection("users").doc(currentUser.uid).set({
                        [`progress.${currentMode}.stage`]: currentStageIndex,
                        [`progress.${currentMode}.mastery`]: stageMastery,
                        lastActive: new Date().toISOString()
                    }, { merge: true });
                } catch(e) { console.log("save error", e); }
            }
        } else {
            feedbackDiv.innerHTML = `<span class='wrong'>❌ ተሳስተሃል! ትክክለኛው: ${currentQuestion.correct} ❌</span>`;
        }
        
        waitingForNext = true;
        
        // Disable options
        document.querySelectorAll(".option").forEach(opt => {
            opt.classList.add("disabled");
        });
        
        // Update progress display
        const stage = currentStages[currentStageIndex];
        const masteredCount = stageMastery[`${currentMode}_stage_${currentStageIndex}`] || 0;
        const totalInStage = stage.letters.length;
        const stageProgress = Math.floor((masteredCount / totalInStage) * 100);
        document.getElementById("stageProgress").style.width = `${stageProgress}%`;
        document.getElementById("masteryDisplay").innerHTML = `⭐ ${stageProgress}% Mastered`;
    }
    
    function nextQuestion() {
        currentQuestion = generateQuestion();
        document.querySelectorAll(".option").forEach(opt => {
            opt.classList.remove("disabled");
        });
        renderGame();
    }
    
    function switchMode(mode) {
        currentMode = mode;
        if (mode === "amharic") {
            currentStages = AMHARIC_STAGES;
        } else if (mode === "english") {
            currentStages = ENGLISH_STAGES;
        } else {
            currentStages = NUMBERS_STAGES;
        }
        
        // Reset or load saved progress
        currentStageIndex = 0;
        if (currentUser && window.userProgress && window.userProgress[mode]) {
            currentStageIndex = window.userProgress[mode].stage || 0;
            stageMastery = window.userProgress[mode].mastery || {};
        } else {
            stageMastery = {};
        }
        
        currentQuestion = null;
        renderGame();
    }
    
    // ======================= AUTHENTICATION UI =======================
    document.getElementById("showSignup").onclick = () => {
        document.getElementById("loginForm").classList.add("hide");
        document.getElementById("signupForm").classList.remove("hide");
    };
    document.getElementById("showLogin").onclick = () => {
        document.getElementById("signupForm").classList.add("hide");
        document.getElementById("loginForm").classList.remove("hide");
    };
    
    document.getElementById("signupBtn").onclick = async () => {
        let name = document.getElementById("signupName").value.trim();
        let email = document.getElementById("signupEmail").value.trim();
        let pass = document.getElementById("signupPassword").value;
        if (!name || !email || !pass) { alert("Fill all fields"); return; }
        if (pass.length < 6) { alert("Password min 6 characters"); return; }
        try {
            let cred = await auth.createUserWithEmailAndPassword(email, pass);
            await db.collection("users").doc(cred.user.uid).set({
                name: name, 
                email: email, 
                createdAt: new Date().toISOString(),
                progress: { 
                    amharic: { stage: 0, mastery: {} }, 
                    english: { stage: 0, mastery: {} }, 
                    numbers: { stage: 0, mastery: {} } 
                }
            });
            currentUser = cred.user;
            window.userProgress = { amharic: { stage: 0, mastery: {} }, english: { stage: 0, mastery: {} }, numbers: { stage: 0, mastery: {} } };
            document.getElementById("authSection").classList.add("hide");
            document.getElementById("learningSection").classList.remove("hide");
            document.getElementById("userNameDisplay").innerText = name;
            switchMode("amharic");
        } catch(e) { alert("Signup error: " + e.message); }
    };
    
    document.getElementById("loginBtn").onclick = async () => {
        let email = document.getElementById("loginEmail").value.trim();
        let pass = document.getElementById("loginPassword").value;
        if (!email || !pass) { alert("Enter email and password"); return; }
        try {
            let cred = await auth.signInWithEmailAndPassword(email, pass);
            let doc = await db.collection("users").doc(cred.user.uid).get();
            let userData = doc.data();
            let name = userData ? userData.name : email.split('@')[0];
            currentUser = cred.user;
            
            // Load saved progress
            window.userProgress = userData?.progress || { 
                amharic: { stage: 0, mastery: {} }, 
                english: { stage: 0, mastery: {} }, 
                numbers: { stage: 0, mastery: {} } 
            };
            
            document.getElementById("authSection").classList.add("hide");
            document.getElementById("learningSection").classList.remove("hide");
            document.getElementById("userNameDisplay").innerText = name;
            switchMode("amharic");
        } catch(e) { alert("Login failed: " + e.message); }
    };
    
    document.getElementById("logoutBtn").onclick = async () => {
        await auth.signOut();
        currentUser = null;
        document.getElementById("authSection").classList.remove("hide");
        document.getElementById("learningSection").classList.add("hide");
        document.getElementById("loginForm").classList.remove("hide");
        document.getElementById("signupForm").classList.add("hide");
    };
    
    // Mode switching
    document.querySelectorAll(".mode-btn").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            switchMode(btn.getAttribute("data-mode"));
        };
    });
    
    // Next button
    document.getElementById("nextBtn").onclick = () => nextQuestion();
    
    console.log("✅ Tsehay Academy with STAGE LEARNING! Derja system ready!");
</script>
</body>
</html>
