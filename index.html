<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Noto Sans Ethiopic', system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #f9a826 0%, #fdd97a 50%, #ffefb5 100%);
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        .sun {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #ffdd77, #ffaa33);
            border-radius: 50%;
            box-shadow: 0 0 60px #ffaa44;
            z-index: 0;
            animation: glowPulse 3s infinite alternate;
            pointer-events: none;
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 20px #ffaa44; transform: translateX(-50%) scale(1);}
            100% { box-shadow: 0 0 80px #ffcc66; transform: translateX(-50%) scale(1.02);}
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 750px;
            margin: 0 auto;
            background: rgba(255, 248, 225, 0.96);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        h1 { text-align: center; font-size: 1.8rem; color: #b45f06; }
        .tsehay-logo { text-align: center; font-size: 40px; margin: 8px 0; }
        
        .input-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #7a4b03; }
        input { width: 100%; padding: 14px; border-radius: 60px; border: 2px solid #ffc857; font-size: 16px; background: white; }
        button { background: #f39c12; color: white; border: none; padding: 14px 20px; border-radius: 60px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }
        
        .mode-buttons { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
        .mode-btn { flex: 1; background: #ffd966; color: #5a3a01; font-size: 14px; padding: 12px; text-align: center; cursor: pointer; border-radius: 40px; transition: all 0.2s; }
        .mode-btn.active { background: #e67e22; color: white; transform: scale(1.02); }
        
        .stage-info {
            background: #ffefcf;
            border-radius: 40px;
            padding: 15px;
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .stage-badge {
            background: #e67e22;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
        }
        .progress-bar {
            flex: 1;
            height: 20px;
            background: #ffd966;
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #2e7d32;
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 20px;
        }
        
        .game-area {
            background: #fff6e5;
            border-radius: 48px;
            padding: 25px;
            text-align: center;
            border: 3px solid #ffcc77;
            position: relative;
            overflow: hidden;
        }
        
        .sequence-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .letter-card {
            background: #ffefcf;
            padding: 20px 30px;
            border-radius: 60px;
            font-size: 60px;
            font-weight: bold;
            box-shadow: inset 0 -2px 0 #ddb56b, 0 5px 15px rgba(0,0,0,0.1);
            min-width: 100px;
            text-align: center;
        }
        
        .missing-slot {
            background: #ffe0a3;
            border: 3px dashed #e67e22;
            padding: 20px 30px;
            border-radius: 60px;
            font-size: 60px;
            font-weight: bold;
            min-width: 100px;
            text-align: center;
            position: relative;
            transition: all 0.3s ease;
        }
        
        .missing-slot.filled {
            background: #ccffcc;
            border: 3px solid #2e7d32;
            animation: celebrate 0.5s ease;
        }
        
        @keyframes celebrate {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); background: #aaffaa; }
            100% { transform: scale(1); }
        }
        
        .options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
            min-height: 120px;
        }
        
        .option {
            background: #fffaec;
            padding: 15px 25px;
            border-radius: 60px;
            font-size: 40px;
            cursor: pointer;
            min-width: 90px;
            text-align: center;
            font-weight: bold;
            border: 3px solid #ffbb55;
            transition: all 0.2s;
            position: relative;
        }
        
        .option:hover { transform: scale(1.05); background: #ffe0a3; }
        .option:active { transform: scale(0.95); }
        .option.disabled { opacity: 0.5; pointer-events: none; }
        
        /* Flying animation */
        .flying {
            position: fixed;
            z-index: 1000;
            animation: flyToTarget 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            pointer-events: none;
            font-size: 50px;
            font-weight: bold;
            background: #fffaec;
            padding: 10px 20px;
            border-radius: 60px;
            border: 3px solid #2e7d32;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        
        @keyframes flyToTarget {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            50% {
                transform: translate(calc(var(--target-x) * 0.5), calc(var(--target-y) * 0.5 - 50px)) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translate(var(--target-x), var(--target-y)) scale(0.8);
                opacity: 0;
            }
        }
        
        /* Dropping animation */
        .dropping {
            position: fixed;
            z-index: 1000;
            animation: dropDown 0.5s ease-in forwards;
            pointer-events: none;
            font-size: 50px;
            font-weight: bold;
            background: #ffcccc;
            padding: 10px 20px;
            border-radius: 60px;
            border: 3px solid #c0392b;
        }
        
        @keyframes dropDown {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(0, 200px) rotate(20deg);
                opacity: 0;
            }
        }
        
        .feedback {
            margin: 15px 0;
            font-size: 24px;
            font-weight: bold;
            min-height: 70px;
        }
        .correct { color: #2b7a2b; }
        .wrong { color: #c0392b; }
        
        .next-btn { background: #2e7d32; margin-top: 10px; }
        .logout { background: #c0392b; width: auto; padding: 8px 16px; margin-top: 0; }
        .auth-toggle { text-align: center; margin-top: 15px; color: #7a4b03; cursor: pointer; }
        .auth-toggle span { text-decoration: underline; font-weight: bold; }
        
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #ffdd77;
            position: absolute;
            animation: confettiFall 1s ease-out forwards;
            pointer-events: none;
            z-index: 1000;
        }
        
        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(300px) rotate(360deg); opacity: 0; }
        }
        
        .hide { display: none; }
        
        @media (max-width: 550px) {
            .letter-card, .missing-slot { font-size: 35px; padding: 12px 18px; min-width: 70px; }
            .option { font-size: 30px; padding: 10px 18px; min-width: 70px; }
            .sequence-container { gap: 10px; }
        }
    </style>
</head>

        { name: "ነ ቤተሰብ", letters: ["ነ","ኑ","ኒ","ና","ኔ","ን","ኖ"] },
        { name: "ኘ ቤተሰብ", letters: ["ኘ","ኙ","ኚ","ኛ","ኜ","ኝ","ኞ"] },
        { name: "አ ቤተሰብ", letters: ["አ","ኡ","ኢ","ኣ","ኤ","እ","ኦ"] },
        { name: "ከ ቤተሰብ", letters: ["ከ","ኩ","ኪ","ካ","ኬ","ክ","ኮ"] },
        { name: "ኸ ቤተሰብ", letters: ["ኸ","ኹ","ኺ","ኻ","ኼ","ኽ","ኾ"] },
        { name: "ወ ቤተሰብ", letters: ["ወ","ዉ","ዊ","ዋ","ዌ","ው","ዎ"] },
        { name: "ዐ ቤተሰብ", letters: ["ዐ","ዑ","ዒ","ዓ","ዔ","ዕ","ዖ"] },
        { name: "ዘ ቤተሰብ", letters: ["ዘ","ዙ","ዚ","ዛ","ዜ","ዝ","ዞ"] },
        { name: "ዠ ቤተሰብ", letters: ["ዠ","ዡ","ዢ","ዣ","ዤ","ዥ","ዦ"] },
        { name: "የ ቤተሰብ", letters: ["የ","ዩ","ዪ","ያ","ዬ","ይ","ዮ"] },
        { name: "ደ ቤተሰብ", letters: ["ደ","ዱ","ዲ","ዳ","ዴ","ድ","ዶ"] },

        { name: "ጠ ቤተሰብ", letters: ["ጠ","ጡ","ጢ","ጣ","ጤ","ጥ","ጦ"] },
        { name: "ጨ ቤተሰብ", letters: ["ጨ","ጩ","ጪ","ጫ","ጬ","ጭ","ጮ"] },
        { name: "ጰ ቤተሰብ", letters: ["ጰ","ጱ","ጲ","ጳ","ጴ","ጵ","ጶ"] },
        { name: "ጸ ቤተሰብ", letters: ["ጸ","ጹ","ጺ","ጻ","ጼ","ጽ","ጾ"] },
        { name: "ፀ ቤተሰብ", letters: ["ፀ","ፁ","ፂ","ፃ","ፄ","ፅ","ፆ"] },
        { name: "ፈ ቤተሰብ", letters: ["ፈ","ፉ","ፊ","ፋ","ፌ","ፍ","ፎ"] },
        { name: "ፐ ቤተሰብ", letters: ["ፐ","ፑ","ፒ","ፓ","ፔ","ፕ","ፖ"] }
    ];
    
    const ENGLISH_STAGES = [
        { name: "A B C D E F G", letters: ["A","B","C","D","E","F","G"] },
        { name: "H I J K L M N", letters: ["H","I","J","K","L","M","N"] },
        { name: "O P Q R S T U", letters: ["O","P","Q","R","S","T","U"] },
        { name: "V W X Y Z", letters: ["V","W","X","Y","Z"] }
    ];
    
    const NUMBERS_STAGES = [];
    for (let i = 1; i <= 1000; i += 10) {
        let end = Math.min(i + 9, 1000);
        let letters = [];
        for (let j = i; j <= end; j++) letters.push(j.toString());
        NUMBERS_STAGES.push({ name: `${i} - ${end}`, letters: letters });
    }
    
    // ======================= GAME STATE =======================
    let currentUser = null;
    let currentMode = "amharic";
    let currentStages = AMHARIC_STAGES;
    let currentStageIndex = 0;
    let stageMastery = {};
    let currentFirst = "", currentCorrect = "", currentThird = "";
    let waitingForNext = false;
    
    function createConfetti() {
        for (let i = 0; i < 30; i++) {
            let confetti = document.createElement("div");
            confetti.className = "confetti";
            confetti.style.left = Math.random() * 100 + "%";
            confetti.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
            confetti.style.width = Math.random() * 8 + 4 + "px";
            confetti.style.height = Math.random() * 8 + 4 + "px";
            confetti.style.animationDuration = Math.random() * 1 + 0.5 + "s";
            document.querySelector(".game-area").appendChild(confetti);
            setTimeout(() => confetti.remove(), 1000);
        }
    }
    
    function flyToTarget(element, targetElement, isCorrect) {
        const rect = element.getBoundingClientRect();
        const targetRect = targetElement.getBoundingClientRect();
        
        const deltaX = targetRect.left + targetRect.width/2 - (rect.left + rect.width/2);
        const deltaY = targetRect.top + targetRect.height/2 - (rect.top + rect.height/2);
        
        const flyingElement = document.createElement("div");
        flyingElement.className = isCorrect ? "flying" : "dropping";
        flyingElement.innerText = element.innerText;
        flyingElement.style.left = rect.left + "px";
        flyingElement.style.top = rect.top + "px";
        flyingElement.style.position = "fixed";
        
        if (isCorrect) {
            flyingElement.style.setProperty("--target-x", deltaX + "px");
            flyingElement.style.setProperty("--target-y", deltaY + "px");
        }
        
        document.body.appendChild(flyingElement);
        
        setTimeout(() => {
            flyingElement.remove();
        }, 600);
        
        return new Promise(resolve => setTimeout(resolve, 300));
    }
    
    function generateQuestion() {
        const stage = currentStages[currentStageIndex];
        const letters = stage.letters;
        
        if (letters.length < 2) return null;
        
        const pos = Math.floor(Math.random() * (letters.length - 1));
        currentFirst = letters[pos];
        currentCorrect = letters[pos + 1];
        currentThird = letters[pos + 2] || "?";
        
        const wrongPool = [];
        for (let i = 0; i < letters.length; i++) {
            if (letters[i] !== currentCorrect && letters[i] !== currentFirst) {
                wrongPool.push(letters[i]);
            }
        }
        if (currentStageIndex > 0) {
            currentStages[currentStageIndex - 1].letters.forEach(l => {
                if (!wrongPool.includes(l) && l !== currentCorrect && l !== currentFirst) wrongPool.push(l);
            });
        }
        
        const shuffled = [...wrongPool].sort(() => Math.random() - 0.5);
        const wrongs = shuffled.slice(0, 3);
        let options = [currentCorrect, ...wrongs];
        for (let i = options.length - 1; i > 0; i--) {
            let j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        
        return { options };
    }
    
    let currentOptions = [];
    
    function renderGame() {
        const q = generateQuestion();
        if (!q) return;
        currentOptions = q.options;
        
        document.getElementById("firstLetter").innerText = currentFirst;
        document.getElementById("thirdLetter").innerText = currentThird;
        document.getElementById("missingSlot").innerHTML = "___";
        document.getElementById("missingSlot").classList.remove("filled");
        
        const optionsDiv = document.getElementById("optionsContainer");
        optionsDiv.innerHTML = "";
        
        currentOptions.forEach(opt => {
            const btn = document.createElement("div");
            btn.className = "option";
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(btn, opt);
            optionsDiv.appendChild(btn);
        });
        
        document.getElementById("feedbackMsg").innerHTML = "";
        waitingForNext = false;
        
        const stage = currentStages[currentStageIndex];
        const masteredCount = stageMastery[`${currentMode}_stage_${currentStageIndex}`] || 0;
        const totalInStage = stage.letters.length;
        const stageProgress = Math.floor((masteredCount / totalInStage) * 100);
        
        document.getElementById("stageDisplay").innerHTML = `Derja ${currentStageIndex + 1}: ${stage.name}`;
        document.getElementById("stageProgress").style.width = `${stageProgress}%`;
        document.getElementById("masteryDisplay").innerHTML = `⭐ ${stageProgress}% Mastered`;
    }
    
    async function handleAnswer(element, selected) {
        if (waitingForNext) return;
        
        const isCorrect = (selected === currentCorrect);
        const feedbackDiv = document.getElementById("feedbackMsg");
        const missingSlot = document.getElementById("missingSlot");
        
        await flyToTarget(element, missingSlot, isCorrect);
        
        if (isCorrect) {
            missingSlot.innerHTML = selected;
            missingSlot.classList.add("filled");
            feedbackDiv.innerHTML = "<span class='correct'>✅ ትክክል! ጥሩ! 🎉</span>";
            createConfetti();
            
            const stageKey = `${currentMode}_stage_${currentStageIndex}`;
            if (!stageMastery[stageKey]) stageMastery[stageKey] = 0;
            
            const stage = currentStages[currentStageIndex];
            const totalLetters = stage.letters.length;
            const currentMastered = stageMastery[stageKey];
            
            if (currentMastered < totalLetters) {
                stageMastery[stageKey] = Math.min(currentMastered + 1, totalLetters);
            }
            
            if (stageMastery[stageKey] >= totalLetters) {
                if (currentStageIndex + 1 < currentStages.length) {
                    feedbackDiv.innerHTML += `<br><span class='correct'>🎉 Derja ${currentStageIndex + 1} ጨረስክ! ወደ ቀጣይ ደረጃ! 🎉</span>`;
                    currentStageIndex++;
                    const newStageKey = `${currentMode}_stage_${currentStageIndex}`;
                    if (!stageMastery[newStageKey]) stageMastery[newStageKey] = 0;
                } else {
                    feedbackDiv.innerHTML += `<br><span class='correct'>🏆 ኮንግራትዩሌሽን! ሁሉንም ጨረስክ! 🏆</span>`;
                }
            }
            
            if (currentUser) {
                try {
                    await db.collection("users").doc(currentUser.uid).set({
                        [`progress.${currentMode}.stage`]: currentStageIndex,
                        [`progress.${currentMode}.mastery`]: stageMastery,
                        lastActive: new Date().toISOString()
                    }, { merge: true });
                } catch(e) { console.log("save error", e); }
            }
        } else {
            feedbackDiv.innerHTML = `<span class='wrong'>❌ ተሳስተሃል! ትክክለኛው: ${currentCorrect} ❌</span>`;
        }
        
        waitingForNext = true;
        
        document.querySelectorAll(".option").forEach(opt => {
            opt.classList.add("disabled");
        });
        
        const stage = currentStages[currentStageIndex];
        const masteredCount = stageMastery[`${currentMode}_stage_${currentStageIndex}`] || 0;
        const totalInStage = stage.letters.length;
        const stageProgress = Math.floor((masteredCount / totalInStage) * 100);
        document.getElementById("stageProgress").style.width = `${stageProgress}%`;
        document.getElementById("masteryDisplay").innerHTML = `⭐ ${stageProgress}% Mastered`;
    }
    
    function nextQuestion() {
        generateQuestion();
        renderGame();
    }
    
    function switchMode(mode) {
        currentMode = mode;
        if (mode === "amharic") currentStages = AMHARIC_STAGES;
        else if (mode === "english") currentStages = ENGLISH_STAGES;
        else currentStages = NUMBERS_STAGES;
        
        currentStageIndex = 0;
        if (currentUser && window.userProgress && window.userProgress[mode]) {
            currentStageIndex = window.userProgress[mode].stage || 0;
            stageMastery = window.userProgress[mode].mastery || {};
        } else {
            stageMastery = {};
        }
        
        generateQuestion();
        renderGame();
    }
    
    // ======================= AUTHENTICATION =======================
    document.getElementById("showSignup").onclick = () => {
        document.getElementById("loginForm").classList.add("hide");
        document.getElementById("signupForm").classList.remove("hide");
    };
    document.getElementById("showLogin").onclick = () => {
        document.getElementById("signupForm").classList.add("hide");
        document.getElementById("loginForm").classList.remove("hide");
    };
    
    document.getElementById("signupBtn").onclick = async () => {
        let name = document.getElementById("signupName").value.trim();
        let email = document.getElementById("signupEmail").value.trim();
        let pass = document.getElementById("signupPassword").value;
        if (!name || !email || !pass) { alert("Fill all fields"); return; }
        if (pass.length < 6) { alert("Password min 6 characters"); return; }
        try {
            let cred = await auth.createUserWithEmailAndPassword(email, pass);
            await db.collection("users").doc(cred.user.uid).set({
                name: name, email: email, createdAt: new Date().toISOString(),
                progress: { amharic: { stage: 0, mastery: {} }, english: { stage: 0, mastery: {} }, numbers: { stage: 0, mastery: {} } }
            });
            currentUser = cred.user;
            window.userProgress = { amharic: { stage: 0, mastery: {} }, english: { stage: 0, mastery: {} }, numbers: { stage: 0, mastery: {} } };
            document.getElementById("authSection").classList.add("hide");
            document.getElementById("learningSection").classList.remove("hide");
            document.getElementById("userNameDisplay").innerText = name;
            switchMode("amharic");
        } catch(e) { alert("Signup error: " + e.message); }
    };
    
    document.getElementById("loginBtn").onclick = async () => {
        let email = document.getElementById("loginEmail").value.trim();
        let pass = document.getElementById("loginPassword").value;
        if (!email || !pass) { alert("Enter email and password"); return; }
        try {
            let cred = await auth.signInWithEmailAndPassword(email, pass);
            let doc = await db.collection("users").doc(cred.user.uid).get();
            let userData = doc.data();
            let name = userData ? userData.name : email.split('@')[0];
            currentUser = cred.user;
            window.userProgress = userData?.progress || { amharic: { stage: 0, mastery: {} }, english: { stage: 0, mastery: {} }, numbers: { stage: 0, mastery: {} } };
            document.getElementById("authSection").classList.add("hide");
            document.getElementById("learningSection").classList.remove("hide");
            document.getElementById("userNameDisplay").innerText = name;
            switchMode("amharic");
        } catch(e) { alert("Login failed: " + e.message); }
    };
    
    document.getElementById("logoutBtn").onclick = async () => {
        await auth.signOut();
        currentUser = null;
        document.getElementById("authSection").classList.remove("hide");
        document.getElementById("learningSection").classList.add("hide");
        document.getElementById("loginForm").classList.remove("hide");
        document.getElementById("signupForm").classList.add("hide");
    };
    
    document.querySelectorAll(".mode-btn").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            switchMode(btn.getAttribute("data-mode"));
        };
    });
    
    document.getElementById("nextBtn").onclick = () => nextQuestion();
    
    console.log("✅ Tsehay Academy with FLYING LETTERS! 🚀");
</script>
</body>
</html>
